# QuietCool Fan Controller - Heltec WiFi LoRa 32 V3 / HiLetgo "ESP32 LoRa V3
# SX1262 0.96in OLED" port (ESP32-S3 + Semtech SX1262; same design, two
# vendor names). NOT YET FLASHED - this is a bring-up config for a board
# that isn't in hand yet; the pin assumptions below are researched, not
# physically verified. See the "PIN CONFIDENCE" notes throughout and the
# port report for what still needs bench confirmation.
#
# STRUCTURE: this is a deliberate standalone file, NOT a `packages:`
# include of quietcool-lora32.yaml. (A second SX1278 unit COULD be a thin
# package wrapper, since it would target byte-identical hardware; no such
# wrapper exists in this repository today.) The honest reason for the
# duplication is narrow: a shared radio-agnostic core is structurally
# feasible - the only seam buried inside shared logic is the
# `sx127x.send_packet` vs `sx126x.send_packet` action inside tx_burst,
# which a one-line per-board `radio_transmit` wrapper script would close -
# but extracting it cannot be bench-verified until this V3 board is in
# hand and flashed, and the SX1278 file is the live source of truth for
# physically-installed whole-house-fan controllers. Until a V3 unit can
# validate the extraction, every radio-agnostic section below (globals,
# fan entity, buttons, PRG button, scripts, timer interval, display,
# sensors) is copied verbatim from quietcool-lora32.yaml, and only the
# radio- and board-touching sections differ. The SX1278 config is
# untouched by this file's existence.
#
# RADIO DIFFERENCE: the SX1262 is a different Semtech packet engine from
# the SX1278 (separate ESPHome `sx126x` component, not `sx127x`), but
# ESPHome 2026.7.0's sx126x component exposes every FSK packet-engine
# parameter this protocol needs - bitrate, deviation, sync word, preamble
# size, variable-length framing with a hardware-inserted/stripped length
# byte, CRC/whitening disable, an `on_packet` receive trigger, and a
# `send_packet` action - with the same argument shapes sx127x uses (see the
# sx126x: block and tx_burst below). GFSK with `shaping: NONE` (pulse-
# shaping off) is electrically equivalent to the 2-FSK this protocol uses;
# see the port report for the full parameter-by-parameter comparison
# against sx127x that established this before any of this file was written.
#
# The RF protocol itself - 433.920 MHz, 2400 bps, +/-10 kHz deviation, sync
# 2D D4, eight 0xAA preamble bytes, variable-length six-byte payload, CRC/
# whitening/Manchester/FEC off, the four fixed command bytes, the 3x/45ms
# TX burst, and all RX validation (length/sender/command-match/speed/
# duration checks, the 0x80 neutral-OFF exception, burst dedup, learn-mode
# two-burst confirmation) - is copied byte-for-byte from
# quietcool-lora32.yaml and MUST NOT be changed independently of it.
#
# Default seed is 0x00000000: a new board with no already-known sender ID,
# so it ships in auto-learn mode and captures the fan's remote on first
# flash. See README "Learn mode / porting to your own fan".
#
# RF transmission only ever happens from ONE place: the queued core script
# tx_burst, which contains the only send_packet call in this firmware. It
# is invoked by five thin, delay-free user-command wrappers and by two bounded
# continuations that those wrappers arm:
#   1. The four fixed state scripts (send_off/send_low/send_medium/send_high),
#      invoked by the confirmation-driven fan entity when a button, physical
#      control, or Home Assistant requests a command. The entity itself is not
#      published until query-correlated RF consensus establishes authority.
#   2. The speed-aware send_timer script, invoked by the Fan Timer select.
#   3. The pre-existing spaced re-fire backstop and the new passive 66 query;
#      both are volatile, bounded, and can only follow a user-initiated command.
# tx_burst's mode: queued preserves each accepted burst. Every equivalent
# active request joins without resetting its bounded budget; different stale
# queued commands are rejected at actual execution. A heard OEM query reserves
# a 2 s physical-remote exchange holdoff before any local query or state TX.
# RX never executes a script or sends a packet. It only records consensus;
# interval code compares that result with the already-armed desired state.
# Home Assistant temperature sensors remain display-only.

substitutions:
  # Device identity. Follows the same substitution pattern as the
  # the SX1278 LoRa32 files: a real third unit should override
  # device_name/device_friendly_name/fallback_ap_ssid/quietcool_sender_id/
  # display_*_entity the same way a second-device wrapper overrides
  # quietcool-lora32.yaml's defaults. These are placeholder-but-
  # functional defaults for the first V3 bring-up.
  device_name: quietcool-lora-v3
  device_friendly_name: "QuietCool RF Controller (LoRa V3)"
  fallback_ap_ssid: "QuietCool-LoRa-V3"

  # New board, no known sender ID yet: ships in auto-learn (see README
  # "Learn mode / porting to your own fan"). Do NOT set this to a nonzero
  # seed until this unit's own OEM remote ID is actually learned or known.
  quietcool_sender_id: "0x00000000"

  # Stable Home Assistant display-source aliases, same mechanism as the
  # other two files. Defaulted to the SX1278 LoRa32 entity IDs as placeholders;
  # re-point these (like a second-device wrapper does) once this
  # unit's install location is known.
  display_indoor_entity: "sensor.quietcool_display_indoor"
  display_outdoor_entity: "sensor.quietcool_display_outdoor"
  display_attic_entity: "sensor.quietcool_display_attic"

  # Spaced command re-fire remains the no-RX safety backstop. Closed-loop
  # verification now layers a query/listen window after every actual command
  # burst and cancels the remaining re-fires only after repeated reports agree
  # with the requested lower-six-bit state. If every reply is lost, all of the
  # original bounded re-fires still occur. OFF retains the larger budget.
  command_refire_count: "3"           # extra re-sends after the initial burst
  off_refire_count: "5"               # OFF re-fires more (safety)
  command_refire_interval_ms: "1000"  # spacing, comfortably past the ~0.5 s busy window

  # Firmware's retry tick is ~562.5 ms. Direct-query fan replies arrived
  # 417-648 ms after query start; a query immediately following a dropped
  # command produced its first clean report at about 805 ms from actual query
  # TX start. Wait 200 ms after a command burst, ignore implausibly-early
  # callbacks, and retain a conservative consensus window through scheduler/
  # radio jitter. Raw live capture also found a second exact response triple
  # at about +1.44/+1.54/+1.65 s. Keep a longer classification-only tail so
  # those repeats cannot masquerade as OEM commands after confirmation; it
  # does not extend the consensus timeout or delay the 1 s safety re-fire.
  closed_loop_query_delay_ms: "200"
  closed_loop_response_min_ms: "300"
  closed_loop_response_window_ms: "1100"
  closed_loop_response_tail_ms: "2500"

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  on_boot:
    priority: -100
    then:
      - logger.log:
          level: WARN
          format: "=== QuietCool CMT2300A - 433.920 MHz, 2.4 kbps 2-FSK ==="
      - lambda: |-
          // Seed the NVS-persisted sender only when it is unprovisioned AND
          // a prior Forget hasn't suppressed the compiled default (FIX 2:
          // NVS restore at priority 800 always runs before this on_boot
          // trigger at priority -100, so without the suppression flag a
          // Forget would silently revert on the very next reboot on a
          // seeded build). A learned/nonzero value always wins across
          // reboot and OTA.
          const uint32_t sender_seed = ${quietcool_sender_id};
          if (id(learned_sender_id) == 0 && id(seed_suppressed)) {
            ESP_LOGW("LEARN", "Compiled default sender ID suppressed by a prior Forget; staying unprovisioned");
          } else if (id(learned_sender_id) == 0 && sender_seed != 0) {
            id(learned_sender_id) = sender_seed;
            learned_sender_id->update();
            global_preferences->sync();
            // Logged distinctly from an accepted learn (see the RX learn
            // branch below) so this compiled value can never be mistaken
            // for a value actually learned from an OEM remote.
            ESP_LOGW("LEARN", "Seeding compiled default sender ID from quietcool_sender_id substitution");
          }

          uint32_t sender_id = id(learned_sender_id);
          if (sender_id == 0) {
            id(remote_sender_id_sensor).publish_state("unset");
            id(learn_active) = true;
            id(learn_auto_mode) = true;
            id(learn_window_started) = millis();
            id(learn_auto_armed_at) = millis();
            id(learn_candidate_id) = 0;
            id(learn_candidate_first_time) = 0;
            ESP_LOGW("LEARN", "No sender ID provisioned; auto-learn armed for up to 15 minutes to learn an OEM remote");
          } else {
            char sender_text[12];
            snprintf(sender_text, sizeof(sender_text), "%02X %02X %02X %02X",
                     (unsigned int) ((sender_id >> 24) & 0xFF),
                     (unsigned int) ((sender_id >> 16) & 0xFF),
                     (unsigned int) ((sender_id >> 8) & 0xFF),
                     (unsigned int) (sender_id & 0xFF));
            id(remote_sender_id_sensor).publish_state(sender_text);
            ESP_LOGW("BOOT", "Device ID: %s", sender_text);
          }

          // Diagnostics-only initialization; none of this can cause a
          // boot-time TX. Text-sensor publication above is telemetry only.
          id(tx_count_sensor).publish_state(0);
          id(rx_valid_count_sensor).publish_state(0);
          id(rx_rejected_count_sensor).publish_state(0);
          id(last_tx_command_sensor).publish_state("none");
          id(last_rx_frame_sensor).publish_state("none");
          id(confirmed_fan_state_sensor).publish_state("unknown");
          id(command_confirmation_status_sensor).publish_state("idle");
          id(fan_capability_sensor).publish_state("unknown");
          // Do not publish a guessed timer selection. The template select's
          // API supports missing state and remains unknown until authoritative
          // query-response consensus.


# Local fan platform whose control() starts command scripts without publishing
# the requested state. Only authoritative query-response consensus may call
# fan.publish_state(); passive RX and estimated timer expiry invalidate the
# separate authority diagnostics without guessing fan state.
external_components:
  - source:
      type: local
      path: components
    components: [quietcool_confirmed_fan]

# =============================================================================
# Board: ESP32-S3, Heltec WiFi LoRa 32 V3 (HiLetgo's "ESP32 LoRa V3 SX1262"
# is the same design under a different vendor name). ESPHome 2026.7.0 ships
# a purpose-built `heltec_wifi_lora_32_V3` PlatformIO board entry (verified
# present in this venv's esphome/components/esp32/boards.py), preferred over
# the generic `esp32-s3-devkitc-1` fallback the port brief suggested.
# =============================================================================
esp32:
  board: heltec_wifi_lora_32_V3
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret quietcool_lora_v3_api_key

ota:
  platform: esphome
  password: !secret quietcool_lora_v3_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${fallback_ap_ssid}
    password: !secret quietcool_lora_v3_fallback_ap_password

captive_portal:

# PIN CONFIDENCE: HIGH. sda/scl/reset_pin cross-checked against both the
# official ESPHome device catalog (devices.esphome.io/devices/heltec-wifi-
# lora-32-v3) and an independent Home Assistant community sx126x/Heltec-V3
# thread; both agree. reset_pin: GPIO21 is new relative to the SX1278 LoRa32
# config (which leaves the SSD1306 reset_pin unset) - the V3 catalog entry
# sets it explicitly, so it's carried here too.
i2c:
  sda: GPIO17
  scl: GPIO18
  frequency: 400kHz

# PIN CONFIDENCE: HIGH. Cross-checked against the same two independent
# sources as the sx126x block below; both agree exactly with each other and
# with the port brief's assumption.
spi:
  clk_pin: GPIO9
  mosi_pin: GPIO10
  miso_pin: GPIO11

# =============================================================================
# Vext / peripheral power switch. The OLED (and any future sensor-header
# peripherals) are powered through Vext on this board, unlike the TTGO
# V2.1 where the OLED is always powered. GPIO36, active LOW: `inverted:
# true` + `restore_mode: ALWAYS_ON` drives the pin low during this
# component's own setup() - no on_boot lambda needed. This matters for
# ordering: GPIO switch components set up at setup_priority::HARDWARE
# (800), strictly before the SSD1306 display component's setup_priority::
# PROCESSOR (400, see esphome/components/ssd1306_base/ssd1306_base.h in
# this venv) - so Vext is guaranteed on before the display initializes,
# with i2c's own bus init (setup_priority::BUS, 1000) unaffected either
# way since it only configures the I2C peripheral, not the downstream
# device. NO RF side effect: this switch only drives a power pin and is
# marked internal (not an HA entity), exactly like the analogous
# battery-ADC-enable switch below.
#
# PIN CONFIDENCE: HIGH for the pin number and active-low polarity (same two
# independent sources as i2c/spi above, both explicitly showing `inverted:
# true` + `restore_mode: ALWAYS_ON` for this exact pin on this exact
# board). NOT physically verified on real hardware.
# =============================================================================
switch:
  - platform: gpio
    id: vext_power
    internal: true
    pin:
      number: GPIO36
      inverted: true
    restore_mode: ALWAYS_ON

  # Battery ADC read-enable gate - see the "Battery Voltage" sensor below
  # for why this board needs one at all (the V2.1's divider has no enable
  # pin). Held continuously on, same simplicity tradeoff as Vext above: the
  # ~7.5 uA the 490 kOhm divider draws while gated on is negligible for a
  # mains-powered whole-house-fan controller, and continuous-on avoids
  # adding gating logic around the periodic ADC sensor's own poll timing.
  #
  # PIN CONFIDENCE: MEDIUM. GPIO37 pull-LOW-to-enable and the 390k/100k
  # divider are corroborated by two independent community sources (Heltec's
  # own community forum and the ropg/heltec_esp32_lora_v3 Arduino library
  # README), but this pin was NOT in the port brief's pinout list and has
  # NOT been physically verified here.
  - platform: gpio
    id: battery_adc_enable
    internal: true
    pin:
      number: GPIO37
      inverted: true
    restore_mode: ALWAYS_ON

# =============================================================================
# Global state - identical to quietcool-lora32.yaml. Every field here
# is radio- and board-agnostic (learn-mode bookkeeping, TX/RX dedup state,
# closed-loop transaction state, the device-local timer mirror, cosmetic
# display-only animation/hysteresis state).
# =============================================================================
globals:
  - id: learned_sender_id
    type: uint32_t
    restore_value: true
    initial_value: "0x00000000"
    # Big-endian four-byte QuietCool sender ID. Zero is the safe
    # unprovisioned sentinel because every real OEM sender starts 0xCB.
    # ESPHome persists this global in NVS, so it survives reboot and OTA.

  - id: seed_suppressed
    type: bool
    restore_value: true
    initial_value: "false"
    # FIX 2: on a seeded build (quietcool_sender_id nonzero), on_boot would
    # otherwise reseed the compiled default every time learned_sender_id
    # reads 0 - silently reverting a Forget on the very next reboot, since
    # NVS restore (priority 800) always runs before on_boot (priority
    # -100). Forget sets this true so the reseed is skipped; a successful
    # learn clears it. Persisted in NVS exactly like learned_sender_id, so
    # a Forget durably stays forgotten across reboot/OTA.

  - id: learn_active
    type: bool
    restore_value: false
    initial_value: "false"

  - id: learn_auto_mode
    type: bool
    restore_value: false
    initial_value: "false"
    # Auto mode stays armed while the sender remains unset. Manual mode is
    # bounded by the 120-second timeout in the learn interval below.

  - id: learn_window_started
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: learn_auto_armed_at
    type: uint32_t
    restore_value: false
    initial_value: "0"
    # FIX 1a: millis() timestamp of the moment unprovisioned auto-learn was
    # (re-)armed - at boot, or by a Forget. The installer is only known to
    # be physically present at that moment, so auto-learn's 120-second
    # windows may only keep re-arming for 15 minutes after this timestamp
    # (see the learn-window interval below); after that ceiling it disarms
    # fully, same as an expired manual window. Re-arming past the ceiling
    # requires a deliberate local/HA action (Learn Remote ID button or the
    # PRG 5-10s hold), each of which grants its own bounded 120s window.

  - id: learn_candidate_id
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: learn_candidate_first_time
    type: uint32_t
    restore_value: false
    initial_value: "0"
    # The first valid frame's millis() timestamp. A matching sender is
    # accepted only >600 ms and <60 s later, across a different RF burst.

  - id: learn_confirm_until
    type: uint32_t
    restore_value: false
    initial_value: "0"
    # Rollover-safe deadline for the brief OLED "LEARNED / ID SAVED"
    # confirmation. Cosmetic only; never read by an RF/TX path.

  - id: tx_burst_sender_id
    type: uint32_t
    restore_value: false
    initial_value: "0"
    # Snapshot of learned_sender_id taken only after tx_burst's zero guard.
    # mode: queued guarantees one snapshot owns all three frames, so a
    # concurrent Forget/re-learn cannot mix sender bytes inside a burst.


  - id: fan_state_known
    type: bool
    restore_value: false
    initial_value: "false"
    # ESPHome's native Fan API cannot represent missing state and exposes its
    # raw default on initial subscription. This explicit diagnostic is true
    # only after authoritative query-response consensus. It becomes false on
    # every new command, uncertain passive observation, failed refresh, or
    # estimated timer deadline; no locally guessed expiry can make it true.

  - id: last_valid_rx_command
    type: uint8_t
    restore_value: false
    initial_value: "0x00"

  - id: last_valid_rx_time
    type: uint32_t
    restore_value: false
    initial_value: "0"
    # millis() timestamp of the last accepted state-command frame, used to
    # deduplicate the OEM's three-frame bursts.

  - id: timer_tx_command
    type: uint8_t
    restore_value: false
    initial_value: "0x00"

  - id: off_tx_command
    type: uint8_t
    restore_value: false
    initial_value: "0x90"
    # Fresh-request scratch: the speed-matched OFF variant (90/A0/B0, like
    # the OEM remote's remembered speed) computed by send_off from the
    # entity's speed on EVERY new request. A closed-loop mismatch re-aims
    # only the live transaction (cl_desired_cmd/refire_cmd), never this.
    # Never 0x80: the neutral form is decoded on RX but never transmitted.

  - id: timer_active
    type: bool
    restore_value: false
    initial_value: "false"
    # True only while a matching locally-initiated timer command has been
    # query-confirmed and the controller has a defensible countdown anchor.
    # A manual query can identify the programmed duration but cannot recover
    # elapsed/remaining time, so it never arms this countdown.

  - id: timer_state_known
    type: bool
    restore_value: false
    initial_value: "false"
    # True only while timer_active/timer_expiry_millis have a locally anchored
    # confirmation, or a query confirms that no timer is active. Any new
    # command invalidates this before TX. Unknown-age timer reports stay false.

  - id: timer_expiry_millis
    type: uint32_t
    restore_value: false
    initial_value: "0"
    # Estimated millis() timestamp for a matching locally initiated timer.
    # Only meaningful while timer_active and timer_state_known are true. Every
    # comparison against it uses rollover-safe
    # signed-difference arithmetic - (int32_t)(timer_expiry_millis -
    # millis()) - so a millis() wraparound (~49.7 days of uptime) can never
    # produce a false "expired" or false "still running" result.

  - id: timer_armed_hours
    type: uint8_t
    restore_value: false
    initial_value: "0"
    # The whole-hour duration the CURRENT timer was armed with (1/2/4/8/12);
    # only meaningful while timer_active and timer_state_known are true.
    # Written only from a matching locally initiated timer confirmation.

  - id: timer_select_synced_hours
    type: uint8_t
    restore_value: false
    initial_value: "0xFF"
    # The hours value (0 = None) the Fan Timer select last had published to
    # it by the 1 s sync mirror. 0xFF forces the first sync after timer state
    # becomes authoritative to publish. Exists because the select's UI state
    # is write-only from the firmware's perspective; this avoids re-publishing
    # an unchanged option every second. UI bookkeeping only - never gates TX.

  # Spaced command re-fire state (see substitutions and the 250 ms re-fire
  # interval). refire_cmd is the command byte to re-send; refire_left is how
  # many re-sends remain; refire_next_ms is the millis() the next re-send is
  # due. Armed by the command wrappers, decremented by the interval, and
  # cleared to 0 by a heard OEM-remote command so a physical press always
  # wins. Never persisted - a reboot must not resurrect a stale re-fire.
  - id: refire_cmd
    type: uint8_t
    restore_value: false
    initial_value: "0x00"
  - id: refire_left
    type: int
    restore_value: false
    initial_value: "0"
  - id: refire_next_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  # Closed-loop command transaction. All state is deliberately volatile: a
  # reboot/OTA can never resume a query or resurrect a command. RX only fills
  # candidate/report globals; the 100 ms interval performs comparisons and
  # the existing interval remains the only automatic command re-fire driver.
  - id: cl_active
    type: bool
    restore_value: false
    initial_value: "false"
  - id: cl_desired_cmd
    type: uint8_t
    restore_value: false
    initial_value: "0x00"
  - id: cl_command_attempts
    type: uint8_t
    restore_value: false
    initial_value: "0"
  - id: cl_last_command_completed_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
    # End time of the latest completed burst for the active transaction.
    # Anchors a matching locally initiated timer; never restored.
  - id: cl_attempt_limit
    type: uint8_t
    restore_value: false
    initial_value: "0"
  - id: cl_query_due
    type: bool
    restore_value: false
    initial_value: "false"
  - id: cl_query_due_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: cl_query_window
    type: bool
    restore_value: false
    initial_value: "false"
  - id: cl_query_epoch
    type: bool
    restore_value: false
    initial_value: "false"
  - id: cl_query_epoch_confirmation
    type: bool
    restore_value: false
    initial_value: "false"
  - id: cl_query_response_complete
    type: bool
    restore_value: false
    initial_value: "false"
  - id: cl_query_started_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: cl_query_count
    type: uint8_t
    restore_value: false
    initial_value: "0"
  - id: cl_candidate_state
    type: uint8_t
    restore_value: false
    initial_value: "0xFF"
  - id: cl_candidate_raw
    type: uint8_t
    restore_value: false
    initial_value: "0xFF"
  - id: cl_candidate_capability
    type: uint8_t
    restore_value: false
    initial_value: "0"
  - id: cl_candidate_total_count
    type: uint8_t
    restore_value: false
    initial_value: "0"
  - id: cl_candidate_exact_count
    type: uint8_t
    restore_value: false
    initial_value: "0"
  - id: cl_candidate_last_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: cl_report_ready
    type: bool
    restore_value: false
    initial_value: "false"
  - id: cl_report_confirmation
    type: bool
    restore_value: false
    initial_value: "false"
  - id: cl_report_state
    type: uint8_t
    restore_value: false
    initial_value: "0xFF"
  - id: cl_report_raw
    type: uint8_t
    restore_value: false
    initial_value: "0xFF"
  - id: cl_report_capability
    type: uint8_t
    restore_value: false
    initial_value: "0"

  # Any received 66 66 is from an external/OEM remote: the SX1262 is
  # half-duplex and cannot hear its own query. It therefore has priority and
  # cancels both the local confirmation transaction and remaining re-fires.
  - id: oem_query_seen
    type: bool
    restore_value: false
    initial_value: "false"
  - id: oem_query_seen_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: fan_anim_frame
    type: int
    restore_value: false
    initial_value: "0"
    # Index [0, 12) into the twelve pre-rendered fan-rotation frame images
    # (fan_frame_0..11 - see tools/generate_fan_frames.py), advanced once
    # per display refresh - ONLY while the fan is running - by the display
    # lambda below (KEEP IN SYNC: FAN_ANIM; mirrored in
    # tools/render_display.py). Purely cosmetic animation state: read only
    # inside the display lambda, never written anywhere else, and never
    # read by any TX/RX/actuation path.

  - id: battery_icon_state
    type: int
    restore_value: false
    initial_value: "-1"
    # Persists the currently-displayed battery icon tier (0=hidden,
    # 1=alert, 2=outline, 3=full, 4=charging, 5=plugged) across display
    # frames so a VBAT reading sitting right at a threshold can't flap the
    # icon between adjacent tiers every ~30s ADC sample (KEEP IN SYNC:
    # BATTERY_ICON below; mirrored in tools/render_display.py). -1 means
    # "no reading yet". Purely cosmetic rendering state, exactly like
    # fan_anim_frame above: read and written only inside the display
    # lambda, never by any TX/RX/timer/battery-sensor path.

  - id: query_probe_started
    type: uint32_t
    restore_value: false
    initial_value: "0"
    # Diagnostic probe window anchor (millis of the last "Query Fan State"
    # press; 0 = no probe ever run). While (millis() - started) < 15000 the
    # RX callback WARN-logs every raw frame - any length, any prefix,
    # BEFORE validation - so the fan's response to a 66 66 wake query can
    # be captured with the ESP's own receiver, and a human OEM-remote press
    # inside the window captures the remote's full query/response/command
    # exchange. Read/written only by the probe button and the raw-log block
    # at the top of on_packet; never gates validation, state publication,
    # or TX.

# =============================================================================
# SX1262 radio - same firmware-derived CMT2300A-compatible profile as the
# sx127x: block in quietcool-lora32.yaml, expressed through the
# ESPHome `sx126x` component instead of `sx127x`. Parameter-by-parameter
# equivalence, established by reading both components' Python schemas and
# C++ sources in this venv before writing this block (see the port report):
#
#   sx127x field           sx126x field            notes
#   ---------------------  -----------------------  ----------------------
#   modulation: FSK         modulation: FSK          -> PACKET_TYPE_GFSK;
#                                                       shaping: NONE below
#                                                       makes it pure 2-FSK
#   bitrate: 2400            bitrate: 2400            identical
#   deviation: 10000          deviation: 10000          identical
#   sync_value: [0x2D,0xD4]  sync_value: [0x2D,0xD4]  identical
#   preamble_size: 8          preamble_size: 8          both measured in
#                                                       BYTES (sx126x's C++
#                                                       multiplies by 8 to
#                                                       get the on-air bit
#                                                       count internally)
#   payload_length: 0        payload_length: 0        BOTH mean "variable
#                                                       length - hardware
#                                                       inserts/strips the
#                                                       length byte" (sx126x
#                                                       set_packet_params_()
#                                                       sets GFSK HeaderType
#                                                       to "variable" only
#                                                       when payload_length_
#                                                       == 0, and transmit_
#                                                       packet()/loop()'s RX
#                                                       path never put the
#                                                       length byte in the
#                                                       vector ESPHome
#                                                       hands to on_packet)
#   crc_enable: false         crc_enable: false         identical
#   (no whitening option)     whitening_enable: false   sx127x has no
#                                                       whitening toggle at
#                                                       all (off by
#                                                       omission); sx126x
#                                                       makes the same
#                                                       "off" explicit
#   packet_mode: true         (not applicable)          sx126x has no
#                                                       continuous/raw mode
#                                                       to opt out of - it's
#                                                       always packet-
#                                                       oriented
#   bitsync: true              (not applicable)          sx126x's GFSK
#                                                       demodulator has
#                                                       hardware clock/data
#                                                       recovery built in;
#                                                       no separate bit-sync
#                                                       enable exists or is
#                                                       needed
#   preamble_polarity: 0xAA   (no equivalent field)     sx126x's GFSK
#                                                       PacketParams opcode
#                                                       has no polarity
#                                                       field; the OEM
#                                                       receiver only needs
#                                                       an alternating
#                                                       preamble pattern
#                                                       long enough for its
#                                                       AGC/clock recovery
#                                                       before the sync
#                                                       word anchors byte
#                                                       alignment, so this
#                                                       is not expected to
#                                                       matter functionally
#   pa_pin: BOOST, pa_power: 17  pa_power: 17           sx126x has no PA-pin
#                                                       choice; hw_version:
#                                                       sx1262 below selects
#                                                       the high-power PA
#                                                       path automatically
#   on_packet: (lambda)        on_packet: (lambda)      identical trigger
#                                                       signature: (vector
#                                                       <uint8_t> x, float
#                                                       rssi, float snr) -
#                                                       copied verbatim
#   sx127x.send_packet         sx126x.send_packet        identical action
#                                                       schema (maybe_
#                                                       simple_value keyed
#                                                       on `data`)
#
# New fields sx126x requires that sx127x has no equivalent for, because the
# SX1262 is architecturally different from the SX1276/78:
#   busy_pin        - the SX1262 exposes a BUSY line the SX1276/78 doesn't
#                     have; required.
#   dio1_pin        - always required for sx126x (vs. sx127x's dio0_pin,
#                     only required when packet_mode: true, which the
#                     downstairs config already sets).
#   hw_version: sx1262 - selects the correct PA/OCP configuration table.
#   rf_switch: true  - the Heltec V3's SX1262 module uses the chip's own
#                     DIO2-as-RF-switch-control feature (SetDio2AsRfSwitch
#                     Ctrl) to drive the antenna TX/RX switch; without this
#                     the module won't actually route power to the antenna
#                     correctly. Confirmed against the official ESPHome
#                     device catalog page for this exact board.
#   tcxo_voltage/tcxo_delay - the Heltec V3's SX1262 module needs the radio
#                     to power its TCXO (temperature-compensated crystal)
#                     via DIO3 before RX/TX; 1_8V / 5ms matches the official
#                     ESPHome device catalog entry for this board.
#   bandwidth        - sx126x's FSK bandwidth enum uses different labels
#                     from sx127x's and, unlike sx127x, REJECTS every LoRa-
#                     named bandwidth (including "125_0kHz", sx127x's
#                     unset/default value that this protocol has always
#                     used) when modulation is FSK - so an explicit,
#                     FSK-legal value is mandatory here, not optional. See
#                     the inline comment below for the specific value
#                     chosen and why.
#
# PIN CONFIDENCE: HIGH for cs/busy/dio1/rst and for rf_switch/tcxo_voltage/
# tcxo_delay - all cross-checked against two independent sources (the
# official ESPHome device catalog page for "Heltec WiFi LoRa 32 V3" and an
# independent Home Assistant community sx126x/Heltec-V3 thread), which
# agree exactly with each other and with the port brief's assumptions.
# NOT physically verified on real hardware - no unit is in hand yet.
# =============================================================================
sx126x:
  id: lora_radio
  cs_pin: GPIO8
  busy_pin: GPIO13
  dio1_pin: GPIO14
  rst_pin: GPIO12
  hw_version: sx1262
  rf_switch: true
  tcxo_voltage: 1_8V
  tcxo_delay: 5ms
  frequency: 433920000
  modulation: FSK
  shaping: NONE
  bitrate: 2400
  deviation: 10000
  sync_value: [0x2D, 0xD4]
  # Variable length makes the SX1262 insert/strip the length byte in
  # hardware, exactly like payload_length: 0 does on sx127x above.
  payload_length: 0
  crc_enable: false
  whitening_enable: false
  preamble_size: 8
  # 0 = preamble-length detection off, relying on the sync word alone to
  # qualify a frame - matching the working sx127x config, which never sets
  # preamble_detect and so uses ITS schema default of 0. NOTE: sx126x's own
  # schema default is 2 (not 0), so this must be set explicitly to
  # reproduce sx127x's already-verified RX behavior; validated safe here
  # because sx126x's config validator requires preamble_detect <=
  # len(sync_value) (2), and 0 <= 2.
  preamble_detect: 0
  # RX channel-filter bandwidth: an RX-only tuning knob (TX correctness -
  # bitrate/deviation/sync/preamble/framing/PA - does not depend on it,
  # since shaping: NONE means no TX-side filter either). The SX1278 build
  # live-validated a 50 kHz receive bandwidth against this protocol
  # (Carson occupied width ~22.4 kHz for 2400 bps / +/-10 kHz deviation),
  # cutting ~4 dB of integrated noise versus the old permissive 125 kHz
  # default. sx126x's FSK bandwidth enum has no 50 kHz entry, so use
  # 58_6kHz, the nearest FSK-legal value that still fully contains the
  # signal. Board not yet bench-verified; if RX proves marginal on real
  # hardware, 78_2kHz is the next-wider legal step.
  bandwidth: 58_6kHz
  pa_power: 17
  on_packet:
    # Strict RX validation. Extended listening showed noise callbacks from
    # 0 to 42 bytes with no CRC to reject them automatically, so every field
    # below is checked before it can contribute to bounded response consensus.
    # Passive frames remain diagnostics-only. Only the interval coordinator
    # publishes query-correlated authoritative state by raw field mutation;
    # RX never calls a control path and can never transmit.
    - lambda: |-
        // Diagnostic probe window (see query_probe_started): after a
        // "Query Fan State" press, WARN-log every raw frame for 15 s so
        // the fan's 66 66 response can be isolated over OTA logs without
        // an SDR. Log-only - validation below is completely unaffected.
        // The hex dump is built ONLY inside this window (or in a VERBOSE
        // build): at the production DEBUG log level ESP_LOGV compiles out,
        // and unconditionally formatting every noise callback was pure
        // per-frame heap churn.
        {
          uint32_t probe_now = millis();
          uint32_t probe_started = id(query_probe_started);
          bool probe_window =
              probe_started != 0 && (probe_now - probe_started) < 15000UL;
          #if ESPHOME_LOG_LEVEL >= ESPHOME_LOG_LEVEL_VERBOSE
          const bool want_hex = true;
          #else
          const bool want_hex = probe_window;
          #endif
          if (want_hex) {
            std::string hex;
            for (uint8_t b : x) {
              char buf[4];
              sprintf(buf, "%02X ", b);
              hex += buf;
            }
            ESP_LOGV("RX", "Raw callback: %d bytes: %s", x.size(), hex.c_str());
            if (probe_window) {
              ESP_LOGW("PROBE", "+%4lu ms len=%2d: %s",
                       (unsigned long) (probe_now - probe_started),
                       (int) x.size(), hex.c_str());
            }
          }
        }

        // The OEM FIFO is fixed at seven bytes including the hardware 0x06
        // length byte, so its application payload is exactly six bytes. We
        // keep the first six available here only for the bounded consensus
        // recovery path below: a corrupted 06->0E length makes the SX1262
        // append FIFO noise even though the underlying payload is still first.
        if (x.size() < 6) {
          id(rx_rejected_count_sensor).publish_state(id(rx_rejected_count_sensor).state + 1);
          ESP_LOGD("RX", "Rejected: short length %d (expected 6)", x.size());
          return;
        }

        uint32_t now = millis();
        bool exact_frame = x.size() == 6 && x[4] == x[5];
        uint8_t cmd = x[4];
        uint8_t speed_nibble = cmd & 0xF0;
        uint8_t duration_nibble = cmd & 0x0F;
        uint8_t state_speed = (cmd >> 4) & 0x03;
        uint8_t canonical_state = cmd & 0x3F;
        uint8_t capability = cmd >> 6;
        bool speed_ok = (speed_nibble == 0x90 || speed_nibble == 0xA0 || speed_nibble == 0xB0);
        bool duration_ok = (duration_nibble == 0x0 || duration_nibble == 0x1 || duration_nibble == 0x2 ||
                             duration_nibble == 0x4 || duration_nibble == 0x8 || duration_nibble == 0xC ||
                             duration_nibble == 0xF);
        // Firmware ignores metadata bits 7:6 for state equality. Values
        // 1/2/3 in those bits mean 1-/2-/3-speed capability; speed remains
        // bits 5:4. Speed zero is only meaningful for an OFF report.
        bool state_encoding_ok = duration_ok && (duration_nibble == 0 || state_speed != 0);
        // Neutral OFF, observed live from a second unit's OEM
        // remote on 2026-07-18: its Off button transmits 80 80 (speed
        // nibble 8 = no remembered speed, duration 0 = off), unlike the
        // downstairs remote's speed-remembered x0 form. Accepted for
        // observed-state decoding only - never transmitted by this
        // firmware, and 8 with any nonzero duration stays rejected until
        // physically observed.
        bool off_neutral = (cmd == 0x80);
        // FIX 1b: only a real state-command frame (a speed nibble of
        // 9/A/B with a valid duration nibble) can ever become or confirm a
        // learn candidate. The 66 66 wake/status query is passive traffic
        // - including a neighboring unit's own query/command exchange
        // overheard mid-air - and deliberately does NOT qualify, so it can
        // never be combined with a genuine button press to complete a
        // learn from cross-talk alone.
        bool learn_command_ok = speed_ok && duration_ok;
        uint32_t sender_id = ((uint32_t) x[0] << 24) | ((uint32_t) x[1] << 16) |
                             ((uint32_t) x[2] << 8) | (uint32_t) x[3];

        // Learn mode is RX + storage only. It consumes every candidate
        // frame here and ALWAYS returns before the normal observed-state
        // path below, so learning can never publish fan state or transmit.
        // Two matching STATE-COMMAND frames from the same 0xCB-prefixed
        // sender are required across different bursts: >600 ms but <60 s
        // apart. The OEM's three 45 ms repeats therefore cannot
        // self-confirm; two distinct button presses on the OEM remote are
        // the documented UX. A different valid sender restarts the pair.
        if (id(learn_active)) {
          if (!id(learn_auto_mode) &&
              (now - id(learn_window_started)) >= 120000UL) {
            id(learn_active) = false;
            id(learn_candidate_id) = 0;
            id(learn_candidate_first_time) = 0;
            ESP_LOGW("LEARN", "Manual learn window expired before this frame");
            return;
          }
          if (!exact_frame || x[0] != 0xCB || !learn_command_ok) {
            id(rx_rejected_count_sensor).publish_state(id(rx_rejected_count_sensor).state + 1);
            ESP_LOGD("LEARN", "Ignored invalid candidate %02X %02X %02X %02X cmd %02X",
                     x[0], x[1], x[2], x[3], cmd);
            return;
          }

          uint32_t candidate_sender_id = sender_id;
          if (id(learn_candidate_id) == 0 ||
              candidate_sender_id != id(learn_candidate_id)) {
            id(learn_candidate_id) = candidate_sender_id;
            id(learn_candidate_first_time) = now;
            ESP_LOGW("LEARN", "Candidate sender %02X %02X %02X %02X captured; press OEM remote again",
                     x[0], x[1], x[2], x[3]);
            return;
          }

          uint32_t candidate_age = now - id(learn_candidate_first_time);
          if ((candidate_age > 600) && (candidate_age < 60000)) {
            id(learned_sender_id) = candidate_sender_id;
            // FIX 2: a successful learn always clears any prior Forget
            // suppression, so a later reboot on a seeded build seeds the
            // newly learned ID's slot correctly (it's already nonzero) and
            // never falls back to treating this unit as still-suppressed.
            id(seed_suppressed) = false;
            // Restored globals normally poll for changes once per second.
            // Push this value into its preference object now, then force
            // the backend commit so an immediate power loss cannot lose it.
            learned_sender_id->update();
            seed_suppressed->update();
            global_preferences->sync();
            id(learn_active) = false;
            id(learn_auto_mode) = false;
            id(learn_candidate_id) = 0;
            id(learn_candidate_first_time) = 0;
            id(learn_confirm_until) = now + 5000UL;

            char sender_text[12];
            snprintf(sender_text, sizeof(sender_text), "%02X %02X %02X %02X",
                     (unsigned int) ((candidate_sender_id >> 24) & 0xFF),
                     (unsigned int) ((candidate_sender_id >> 16) & 0xFF),
                     (unsigned int) ((candidate_sender_id >> 8) & 0xFF),
                     (unsigned int) (candidate_sender_id & 0xFF));
            id(remote_sender_id_sensor).publish_state(sender_text);
            // Seed the duplicate-burst suppressor with the accepting
            // frame: the 1-2 remaining 45 ms repeats of this same OEM
            // burst now match the freshly learned sender and would
            // otherwise fall through to the normal observed-state path
            // and publish the LEARNING press as live fan state (seen on
            // a second-unit onboarding: entity stuck "Low"
            // right after LEARNED). With the tracker seeded they hit the
            // fixed dedup window and are suppressed like any other
            // intra-burst repeat.
            id(last_valid_rx_command) = cmd;
            id(last_valid_rx_time) = now;
            ESP_LOGW("LEARN", "Accepted and persisted sender ID %s from two distinct bursts", sender_text);
            return;
          }

          if (candidate_age >= 60000) {
            id(learn_candidate_id) = candidate_sender_id;
            id(learn_candidate_first_time) = now;
            ESP_LOGW("LEARN", "Candidate confirmation expired; restarted two-burst count");
          } else {
            ESP_LOGD("LEARN", "Same-burst candidate repeat suppressed at %lu ms",
                     (unsigned long) candidate_age);
          }
          return;
        }

        // OEM firmware recognizes CE with exact suffix/duplicate checks, but
        // sets a flag that bypasses its normal state transition. CE is never
        // confirmation evidence.
        if (exact_frame && x[0] == 0xCE && (sender_id & 0x00FFFFFFUL) ==
            (id(learned_sender_id) & 0x00FFFFFFUL)) {
          ESP_LOGI("RX", "CE special frame observed and ignored: %02X %02X", x[4], x[5]);
          return;
        }

        // Because this radio is half-duplex, an exact 66 66 that it receives
        // cannot be its own query. It is an OEM remote taking physical
        // control; cancel pending automatic work before that remote's command.
        if (exact_frame && cmd == 0x66 && sender_id == id(learned_sender_id)) {
          id(fan_state_known) = false;
          id(timer_state_known) = false;
          id(fan_state_known_sensor).publish_state(false);
          id(timer_state_known_sensor).publish_state(false);
          id(fan_confirmed_off_sensor).publish_state(false);
          id(oem_query_seen) = true;
          id(oem_query_seen_ms) = now;
          id(refire_left) = 0;
          id(cl_active) = false;
          id(cl_query_due) = false;
          id(cl_query_window) = false;
          id(cl_query_epoch) = false;
          id(cl_query_epoch_confirmation) = false;
          id(cl_report_ready) = false;
          // Stop any remaining frames/queued bursts. This is cancellation,
          // never transmission, and gives an unmistakable physical OEM query
          // priority even if it lands in a 45 ms local inter-frame gap.
          id(tx_burst).stop();
          id(command_confirmation_status_sensor).publish_state("superseded by OEM remote query");
          ESP_LOGW("RX", "External OEM query observed; local confirmation/re-fire cancelled");
          return;
        }

        // Closed-loop response direction is established by this local query
        // window, not by bit 7. The fan was captured returning both 1F (no
        // metadata) and B0/90 (2-speed metadata), and the STM32 masks bits
        // 7:6 before comparing state. Exact frames use OEM validation. A
        // separate confidence tier can recover a known one-bit header error
        // or corrupted variable-length byte, but only inside this window.
        uint32_t query_age = now - id(cl_query_started_ms);
        // Keep the epoch independent of cl_active/cl_query_window. Consensus
        // closes the accepting window immediately, but later repeats from the
        // same fan response train (observed through about +1.65 s) must remain
        // passive rather than falling through and masquerading as an OEM
        // command. This longer tail is classification-only: correlated_response
        // retains the shorter 1.1 s consensus bound. A real OEM 66 66 was
        // handled above and always tears down this epoch before its command.
        bool local_query_epoch =
            id(cl_query_epoch) &&
            query_age <= ${closed_loop_response_tail_ms};
        bool observed_from_local_query =
            local_query_epoch &&
            query_age >= ${closed_loop_response_min_ms} &&
            query_age <= ${closed_loop_response_window_ms};
        bool correlated_response =
            observed_from_local_query && !id(cl_query_response_complete) &&
            ((!id(cl_query_epoch_confirmation) && !id(cl_active)) ||
             (id(cl_query_epoch_confirmation) &&
              id(cl_active) && id(cl_query_window)));

        auto bit_count = [](uint8_t value) -> uint8_t {
          uint8_t count = 0;
          while (value != 0) {
            count += value & 1;
            value >>= 1;
          }
          return count;
        };
        uint32_t learned = id(learned_sender_id);
        uint8_t expected_header[4] = {
          0xCB,
          (uint8_t) ((learned >> 16) & 0xFF),
          (uint8_t) ((learned >> 8) & 0xFF),
          (uint8_t) (learned & 0xFF)
        };
        uint8_t header_bit_errors = 0;
        uint8_t ce_header_bit_errors = bit_count(x[0] ^ 0xCE);
        for (int i = 0; i < 4; i++) {
          header_bit_errors += bit_count(x[i] ^ expected_header[i]);
          if (i > 0) ce_header_bit_errors += bit_count(x[i] ^ expected_header[i]);
        }
        bool header_recoverable =
            header_bit_errors <= 1 && header_bit_errors < ce_header_bit_errors;
        bool duplicate_state = x[4] == x[5];
        bool recovered_candidate =
            local_query_epoch && header_recoverable && duplicate_state &&
            state_encoding_ok && (x.size() != 6 || header_bit_errors != 0);
        bool exact_candidate =
            local_query_epoch && x.size() == 6 && header_bit_errors == 0 &&
            duplicate_state && state_encoding_ok;

        if (exact_candidate || recovered_candidate) {
          // Before the minimum turnaround, or after this epoch already
          // produced consensus, consume only as a passive local-query repeat.
          // In particular, never let a fan-originated 90/A0/B0-family report
          // reach remote_command_ok and cancel/overwrite the transaction.
          if (!correlated_response || id(cl_report_ready)) {
            uint8_t passive_state = duration_nibble == 0 ? 0 : canonical_state;
            if (id(cl_query_response_complete) &&
                passive_state != id(cl_report_state)) {
              // A contradictory exact/recoverable frame in the classification
              // tail could be a missed-query OEM command. It is not enough to
              // steer control by itself, but it must fail authority closed.
              id(fan_state_known) = false;
              id(timer_state_known) = false;
              id(timer_active) = false;
              id(fan_state_known_sensor).publish_state(false);
              id(timer_state_known_sensor).publish_state(false);
              id(fan_confirmed_off_sensor).publish_state(false);
              bool poisoned_confirmation =
                  id(cl_report_ready) && id(cl_report_confirmation);
              bool poisoned_manual =
                  id(cl_report_ready) && !id(cl_report_confirmation);
              // Consensus is a mailbox, not an immutable fact. A conflicting
              // frame before the 100 ms coordinator consumes it must poison
              // that mailbox or the coordinator would republish the very
              // authority invalidated above.
              id(cl_report_ready) = false;
              id(cl_report_confirmation) = false;
              if (poisoned_confirmation) {
                id(cl_query_window) = false;
                if (id(refire_left) > 0) {
                  id(command_confirmation_status_sensor).publish_state(
                      "conflicting response tail; spaced re-fire pending");
                } else {
                  id(cl_active) = false;
                  id(cl_query_due) = false;
                  id(command_confirmation_status_sensor).publish_state(
                      "FAILED: conflicting response tail after final attempt");
                }
              } else if (poisoned_manual) {
                id(command_confirmation_status_sensor).publish_state(
                    "manual refresh FAILED: conflicting response tail");
              }
              ESP_LOGW("CLOSED_LOOP",
                       "Contradictory tail frame %02X invalidated confirmed authority",
                       cmd);
            }
            ESP_LOGD("CLOSED_LOOP", "Passive response repeat at +%lu ms ignored after window close",
                     (unsigned long) query_age);
            return;
          }

          // OFF is one canonical state regardless of remembered speed; this
          // is the same wildcard used by the OEM matcher's OFF branch.
          if (duration_nibble == 0) canonical_state = 0;

          if (id(cl_candidate_total_count) == 0 ||
              canonical_state != id(cl_candidate_state)) {
            id(cl_candidate_state) = canonical_state;
            id(cl_candidate_raw) = cmd;
            id(cl_candidate_capability) = capability;
            id(cl_candidate_total_count) = 0;
            id(cl_candidate_exact_count) = 0;
            id(cl_candidate_last_ms) = 0;
          }

          // Honest timing note: one 17-byte frame (8 preamble + 2 sync +
          // 1 length + 6 payload) takes ~57 ms of airtime at 2400 bps, so
          // successive callbacks within ONE three-frame burst arrive about
          // 102 ms apart (45 ms gap + airtime) - the same ~100-130 ms
          // spacing as the fan's reply trains (live: +421/+522/+621 ms IS
          // one burst). No dedup floor can therefore distinguish "frames
          // of one burst" from "independent transmissions", and consensus
          // here deliberately means INTRA-BURST REDUNDANCY against
          // per-frame bit errors on a CRC-less link, not proof of multiple
          // bursts. The 60 ms floor only stops the same frame delivered
          // twice (duplicate callback/reflection) from double-counting.
          // The resulting ambiguity - an OEM remote press whose preceding
          // 66 66 query we missed can reach consensus inside our window -
          // is handled by the mismatch yield policy in the coordinator,
          // not by timing.
          if (id(cl_candidate_total_count) == 0 ||
              (now - id(cl_candidate_last_ms)) >= 60UL) {
            id(cl_candidate_total_count)++;
            if (exact_candidate) id(cl_candidate_exact_count)++;
            id(cl_candidate_last_ms) = now;
            id(cl_candidate_raw) = cmd;
            if (capability != 0) id(cl_candidate_capability) = capability;
          }

          if (exact_candidate) {
            id(rx_valid_count_sensor).publish_state(id(rx_valid_count_sensor).state + 1);
            char rxbuf[24];
            snprintf(rxbuf, sizeof(rxbuf), "STATE %02X %02X", cmd, cmd);
            id(last_rx_frame_sensor).publish_state(rxbuf);
          } else {
            ESP_LOGW("RX", "Recovered response candidate from len=%d/header-errors=%u: state %02X",
                     (int) x.size(), (unsigned int) header_bit_errors, canonical_state);
          }

          uint8_t candidate_total_count = id(cl_candidate_total_count);
          uint8_t candidate_exact_count = id(cl_candidate_exact_count);
          bool consensus = candidate_total_count >= 2 &&
                           (candidate_exact_count >= 1 || candidate_total_count >= 3);
          if (consensus) {
            id(cl_report_state) = id(cl_candidate_state);
            id(cl_report_raw) = id(cl_candidate_raw);
            id(cl_report_capability) = id(cl_candidate_capability);
            id(cl_report_confirmation) = id(cl_query_epoch_confirmation);
            id(cl_report_ready) = true;
            id(cl_query_response_complete) = true;
            id(cl_query_window) = false;
            ESP_LOGI("CLOSED_LOOP", "%s response consensus state=%02X raw=%02X (%u total/%u exact)",
                     id(cl_report_confirmation) ? "Command" : "Manual",
                     id(cl_report_state), id(cl_report_raw),
                     (unsigned int) candidate_total_count,
                     (unsigned int) candidate_exact_count);
          }
          return;
        }

        // Normal six-byte traffic remains just as strict as the OEM parser.
        // The recovery above never makes a malformed callback valid here.
        if (x.size() != 6) {
          id(rx_rejected_count_sensor).publish_state(id(rx_rejected_count_sensor).state + 1);
          ESP_LOGD("RX", "Rejected: length %d (expected 6)", x.size());
          return;
        }
        if (x[4] != x[5]) {
          id(rx_rejected_count_sensor).publish_state(id(rx_rejected_count_sensor).state + 1);
          ESP_LOGD("RX", "Rejected: command byte mismatch %02X != %02X", x[4], x[5]);
          return;
        }
        if (sender_id != id(learned_sender_id)) {
          id(rx_rejected_count_sensor).publish_state(id(rx_rejected_count_sensor).state + 1);
          ESP_LOGD("RX", "Rejected: sender mismatch %02X %02X %02X %02X", x[0], x[1], x[2], x[3]);
          return;
        }
        if (!state_encoding_ok) {
          id(rx_rejected_count_sensor).publish_state(id(rx_rejected_count_sensor).state + 1);
          ESP_LOGD("RX", "Rejected: invalid state byte %02X", cmd);
          return;
        }

        // The OEM controller and this firmware both send every command as
        // a three-frame burst. Live callbacks for one train arrive about
        // 102 ms apart (~204 ms first-to-third), so suppress repeats for a
        // fixed 300 ms measured from the first accepted frame. Do NOT slide
        // this timestamp on a suppressed repeat: the former 450 ms sliding
        // window chained a distinct same-command press at ~400 ms into the
        // first burst and could hide a physical OFF pressed after local work
        // began. A fixed burst epoch preserves physical-control priority.
        bool is_duplicate =
            (cmd == id(last_valid_rx_command)) && ((now - id(last_valid_rx_time)) < 300);
        if (is_duplicate) {
          ESP_LOGD("RX", "Duplicate burst frame %02X suppressed", cmd);
          return;
        }
        id(last_valid_rx_command) = cmd;
        id(last_valid_rx_time) = now;

        id(rx_valid_count_sensor).publish_state(id(rx_valid_count_sensor).state + 1);
        char rxbuf[24];
        snprintf(rxbuf, sizeof(rxbuf), "%02X %02X", cmd, cmd);
        id(last_rx_frame_sensor).publish_state(rxbuf);
        ESP_LOGI("RX", "Valid state frame accepted: %02X %02X", cmd, cmd);

        // An exact normal command outside our correlated response window is
        // accepted as OEM traffic, but is not proof the fan acted on it. It
        // cancels local work and fails authority closed without publishing
        // fan state. Other valid state/capability encodings are likewise
        // diagnostics-only. A received OEM query cancelled even earlier.
        bool recent_oem_query =
            id(oem_query_seen) && (now - id(oem_query_seen_ms)) < 2000UL;
        bool remote_command_ok =
            ((speed_ok && duration_ok) || off_neutral) &&
            (!local_query_epoch || recent_oem_query);
        if (remote_command_ok) {
          // A heard OEM command is authorized external control, but not proof
          // that the fan received it. Invalidate before any TX-in-flight early
          // return; a later locally correlated response may promote it again.
          id(fan_state_known) = false;
          id(timer_state_known) = false;
          id(fan_state_known_sensor).publish_state(false);
          id(timer_state_known_sensor).publish_state(false);
          id(fan_confirmed_off_sensor).publish_state(false);
          id(refire_left) = 0;
          id(cl_active) = false;
          id(cl_query_due) = false;
          id(cl_query_window) = false;
          // Tear the query epoch down too, exactly like the 66 66 branch
          // above: an authoritative OEM command ends any local epoch, so
          // follow-up frames in what was the tail get processed normally
          // instead of being swallowed as passive repeats.
          id(cl_query_epoch) = false;
          id(cl_query_epoch_confirmation) = false;
          id(cl_report_ready) = false;
          // Physical controls always win. Even if the preceding OEM query was
          // missed while this half-duplex radio transmitted, stop the active
          // burst and every queued local command before it can override the
          // accepted external command in a later 45 ms inter-frame gap.
          id(tx_burst).stop();
          id(command_confirmation_status_sensor).publish_state("superseded by OEM remote command");
          ESP_LOGW("RX", "OEM command %02X accepted; local TX and confirmation cancelled", cmd);
          return;
        }

        // Any other strictly validated passive state observation is still
        // evidence that our last confirmation may be stale. Fail authority
        // closed without mutating the safety fan entity or transmitting.
        id(fan_state_known) = false;
        id(timer_state_known) = false;
        id(timer_active) = false;
        id(fan_state_known_sensor).publish_state(false);
        id(timer_state_known_sensor).publish_state(false);
        id(fan_confirmed_off_sensor).publish_state(false);

        // Our own TX cannot self-receive (the SX1262 is half-duplex), so a
        // frame here while TX is active is concurrent external traffic. It is
        // diagnostic only; the safety fan entity is confirmation-driven.
        if (id(tx_burst).is_running()) {
          ESP_LOGD("RX", "TX burst in flight; retaining passive frame %02X as diagnostics only", cmd);
          return;
        }
        // A validated passive frame is a command or observation, not proof
        // that the fan actuated it. Keep it in RF diagnostics only. The fan
        // entity changes exclusively from bounded local-query consensus in
        // the coordinator, eliminating optimistic/passive HA state flapping.
        ESP_LOGI("RX", "Passive state frame %02X retained as diagnostics; Refresh to confirm physical state", cmd);

# =============================================================================
# Firmware-derived six-byte application payloads. Hardware supplies preamble,
# sync, and the variable-length byte. Low and High are physically verified
# on the the SX1278 LoRa32 SX1278 units; nothing on this board is
# physically verified yet.
#
#   OFF:  speed-matched  = 0x90 / 0xA0 / 0xB0 (from Low / Med / High)
#   LOW:  (LOW | ON)   = 0x90 | 0x0F = 0x9F
#   MED:  (MED | ON)   = 0xA0 | 0x0F = 0xAF
#   HIGH: (HIGH | ON)  = 0xB0 | 0x0F = 0xBF
#
# The three ON payloads are byte-identical to the previously verified
# firmware and must not change. OFF uses the OEM remote's remembered-speed
# variant at runtime. That is protocol-faithful compatibility policy, not a
# claim that the fan rejects every other duration-zero variant: production
# showed intermittent 0x90 acceptance from High. send_timer likewise computes
# the speed-aware timer/duration byte at runtime.
# These payloads must stay identical to quietcool-lora32.yaml.
#
# All RF transmission is serialized through tx_burst, the single queued
# core script and the ONLY place send_packet is called. The four
# fixed state scripts and send_timer are thin, delay-free wrappers: they
# log, arm transaction bookkeeping, and script.execute tx_burst with their
# command byte, then return immediately (script.execute does not block).
# tx_burst increments diagnostics only after its unset-ID refusal guard.
# Accepted tx_burst runs are serialized, so their three-frame bursts never
# interleave. The queue is deliberately bounded (max_runs: 5); an execution
# beyond that capacity can be rejected by ESPHome. Transaction state is fully
# armed before enqueue. Automatic query/re-fire actions wait until no burst is
# active, clear stale queued work, and then execute the latest desired action;
# this guarantees a bounded convergence attempt even if an earlier enqueue was
# rejected. Intermediate rapid presses are not promised one RF burst each.
# =============================================================================
script:
  - id: tx_burst
    mode: queued
    max_runs: 5
    parameters:
      cmd: uint8_t
    then:
      - if:
          condition:
            lambda: |-
              bool scheduled_confirmation_query =
                  cmd == 0x66 && id(cl_active) && id(cl_query_window);
              bool unsafe_manual_query =
                  cmd == 0x66 && !scheduled_confirmation_query &&
                  (id(cl_active) || id(cl_report_ready) || id(cl_query_epoch));
              bool stale_state_command =
                  cmd != 0x66 &&
                  (!id(cl_active) || cmd != id(cl_desired_cmd));
              bool oem_exchange_holdoff =
                  id(oem_query_seen) &&
                  (millis() - id(oem_query_seen_ms)) < 2000UL;
              return id(learned_sender_id) == 0 || unsafe_manual_query ||
                     stale_state_command || oem_exchange_holdoff;
          then:
            - lambda: |-
                if (id(learned_sender_id) == 0) {
                  // Hard safety stop: an unset sender must never put a
                  // sentinel/guess on air or increment TX diagnostics.
                  ESP_LOGE("TX", "Refused command %02X: Remote Sender ID is unset", cmd);
                } else if (cmd == 0x66 &&
                           (id(cl_active) || id(cl_report_ready) || id(cl_query_epoch))) {
                  // Do not let a manual/probe query erase a response mailbox
                  // in the <100 ms between RX consensus and coordinator use,
                  // or interfere with a live command transaction.
                  ESP_LOGW("TX", "Refused manual query during active/pending confirmation or prior response tail");
                  id(command_confirmation_status_sensor).publish_state(
                      "manual refresh refused: active/pending confirmation or prior response tail");
                } else if (cmd != 0x66 &&
                           (!id(cl_active) || cmd != id(cl_desired_cmd))) {
                  // Latest desired state owns the queue. A rapid Low -> High
                  // -> Off sequence may leave older invocations queued, but
                  // they are discarded here before any airtime.
                  ESP_LOGW("TX", "Refused stale queued command %02X (latest is %02X)",
                           cmd, id(cl_desired_cmd));
                } else {
                  // A heard OEM 66 reserves the complete physical remote
                  // query/response/command exchange. Never open a competing
                  // local query epoch or transmit during that holdoff.
                  ESP_LOGW("TX", "Deferred command %02X during OEM remote exchange", cmd);
                }
          else:
            - lambda: |-
                // A deliberate user command during an open MANUAL learn
                // window means the user is operating the fan, not pairing:
                // close the window so RX validation and the closed loop
                // work normally for this command (the learn branch would
                // otherwise consume every frame, silently degrading it to
                // blind open-loop re-fire). Unprovisioned auto-learn never
                // reaches here - the unset-ID refusal above fired first.
                if (id(learn_active)) {
                  id(learn_active) = false;
                  id(learn_auto_mode) = false;
                  id(learn_candidate_id) = 0;
                  id(learn_candidate_first_time) = 0;
                  ESP_LOGW("LEARN", "Learn window cancelled by user command");
                }
                // Invalidate again at actual serialized execution. A mismatch
                // report may have made the old state known between attempts;
                // every automatic re-fire can change the fan just as the
                // initial user burst can. Queries are observation-only.
                if (cmd != 0x66) {
                  id(fan_state_known) = false;
                  id(timer_state_known) = false;
                  id(fan_state_known_sensor).publish_state(false);
                  id(timer_state_known_sensor).publish_state(false);
                  id(fan_confirmed_off_sensor).publish_state(false);
                  // Poison any older manual/command query epoch at actual
                  // serialized execution too. Late replies remain tail-only
                  // diagnostics and cannot republish stale authority.
                  id(cl_query_response_complete) = true;
                  id(cl_candidate_state) = 0xFF;
                  id(cl_candidate_raw) = 0xFF;
                  id(cl_candidate_capability) = 0;
                  id(cl_candidate_total_count) = 0;
                  id(cl_candidate_exact_count) = 0;
                  id(cl_candidate_last_ms) = 0;
                  id(cl_report_ready) = false;
                  id(cl_report_confirmation) = false;
                }
                id(tx_burst_sender_id) = id(learned_sender_id);
                id(tx_count_sensor).publish_state(id(tx_count_sensor).state + 1);
                const char *label = "timer";
                if (cmd == 0x66) label = "QUERY";
                else if ((cmd & 0x0F) == 0x0) label = "OFF";  // 90/A0/B0 speed-matched variants
                else if (cmd == 0x9F) label = "LOW";
                else if (cmd == 0xAF) label = "MED";
                else if (cmd == 0xBF) label = "HIGH";
                if (cmd == 0x66) {
                  // Anchor every locally-transmitted query at its actual
                  // serialized execution time, including a queued diagnostic
                  // probe. The coordinator opens cl_query_window only for an
                  // automatic confirmation query. A manual Refresh uses the
                  // same bounded consensus but is granted authority only in
                  // the 300-1100 ms response window; the longer epoch tail is
                  // classification-only.
                  id(cl_query_epoch) = true;
                  id(cl_query_epoch_confirmation) =
                      id(cl_active) && id(cl_query_window);
                  id(cl_query_response_complete) = false;
                  id(cl_query_started_ms) = millis();
                  id(cl_candidate_state) = 0xFF;
                  id(cl_candidate_raw) = 0xFF;
                  id(cl_candidate_capability) = 0;
                  id(cl_candidate_total_count) = 0;
                  id(cl_candidate_exact_count) = 0;
                  id(cl_candidate_last_ms) = 0;
                  id(cl_report_ready) = false;
                  if (!id(cl_query_epoch_confirmation)) {
                    // A manual Refresh requests fresh authority. Preserve the
                    // last-confirmed text for diagnosis, but mark control state
                    // unknown until this query reaches response consensus.
                    id(fan_state_known) = false;
                    id(timer_state_known) = false;
                    id(timer_active) = false;
                    id(fan_state_known_sensor).publish_state(false);
                    id(timer_state_known_sensor).publish_state(false);
                    id(fan_confirmed_off_sensor).publish_state(false);
                    id(command_confirmation_status_sensor).publish_state("manual refresh pending");
                  }
                }
                char txbuf[24];
                snprintf(txbuf, sizeof(txbuf), "%02X (%s)", cmd, label);
                id(last_tx_command_sensor).publish_state(txbuf);
            - repeat:
                count: 3
                then:
                  - sx126x.send_packet:
                      data: !lambda |-
                        uint32_t sender_id = id(tx_burst_sender_id);
                        return {
                          (uint8_t) ((sender_id >> 24) & 0xFF),
                          (uint8_t) ((sender_id >> 16) & 0xFF),
                          (uint8_t) ((sender_id >> 8) & 0xFF),
                          (uint8_t) ((sender_id >> 0) & 0xFF),
                          cmd, cmd
                        };
                  - delay: 45ms
            - lambda: |-
                // Only a completed state-command burst belonging to the
                // current user request may schedule a verification query.
                // Query bursts themselves and stale queued commands cannot.
                if (cmd != 0x66 && id(cl_active) && cmd == id(cl_desired_cmd)) {
                  id(cl_command_attempts) = id(cl_command_attempts) + 1;
                  id(cl_last_command_completed_ms) = millis();
                  // The actual-execution guard normally discards obsolete
                  // queue entries. Keep this cap as a final invariant: no
                  // accepted command source can exceed the current
                  // transaction's bounded attempt budget.
                  if (id(cl_command_attempts) >= id(cl_attempt_limit)) {
                    id(refire_left) = 0;
                  }
                  id(cl_query_window) = false;
                  id(cl_query_due) = true;
                  uint32_t next_query_due =
                      millis() + ${closed_loop_query_delay_ms};
                  if (id(cl_query_epoch)) {
                    // The fan can repeat one query's response through the
                    // 2.5 s classification tail. Do not let those old frames
                    // enter the NEXT query's accepted window: schedule its TX
                    // so the 300 ms minimum turnaround ends no earlier than
                    // the prior tail. Spaced command re-fires remain eligible
                    // while this query is merely pending.
                    uint32_t prior_tail_safe_query_start =
                        id(cl_query_started_ms) +
                        ${closed_loop_response_tail_ms} -
                        ${closed_loop_response_min_ms} + 1UL;
                    if ((int32_t) (prior_tail_safe_query_start - next_query_due) > 0) {
                      next_query_due = prior_tail_safe_query_start;
                    }
                  }
                  id(cl_query_due_ms) = next_query_due;
                  // Preserve the original one-second safety spacing, measured
                  // from the actual end of this serialized burst.
                  if (id(refire_left) > 0 && cmd == id(refire_cmd)) {
                    id(refire_next_ms) = millis() + ${command_refire_interval_ms};
                  }
                  char status[64];
                  snprintf(status, sizeof(status), "pending response after command %u/%u",
                           (unsigned int) id(cl_command_attempts),
                           (unsigned int) id(cl_attempt_limit));
                  id(command_confirmation_status_sensor).publish_state(status);
                }

  - id: begin_transaction
    parameters:
      cmd: uint8_t
      refires: uint8_t
    then:
      - if:
          condition:
            lambda: |-
              // Equivalent-request JOIN (2026-07-19 Off-flapping RCA): a
              // request equal to the ACTIVE transaction's desired state is
              // an observation, not a fresh transaction - joining preserves
              // the bounded command/refire budget so an entity-feedback
              // storm cannot reset it. Off equivalence spans every
              // duration-zero variant (80/90/A0/B0), so a duplicate Off
              // still joins after a mismatch re-aims 90 -> B0; every other
              // command must match on the lower six bits.
              //
              // Deliberate scope: only true duplicates join. Rapid A->B->A
              // alternation starts a fresh transaction per genuinely new
              // desired state and may spend one extra attempt re-sending A
              // (tx_burst's stale-command guard discards the obsolete B
              // burst before airtime); the budget stays hard-bounded.
              if (!id(cl_active)) return false;
              bool both_off = ((cmd & 0x0F) == 0) &&
                              ((id(cl_desired_cmd) & 0x0F) == 0);
              bool same_state =
                  (id(cl_desired_cmd) & 0x3F) == (cmd & 0x3F);
              return both_off || same_state;
          then:
            - lambda: |-
                // Observation only: no enqueue, no counter reset, no
                // report/candidate clear, no status overwrite.
                ESP_LOGW("CLOSED_LOOP",
                         "Duplicate request 0x%02X joined active transaction (%u/%u command(s), %d re-fires left)",
                         cmd,
                         (unsigned int) id(cl_command_attempts),
                         (unsigned int) id(cl_attempt_limit),
                         id(refire_left));
          else:
            - lambda: |-
                // Arm the COMPLETE transaction before tx_burst can run, so a
                // second HA call in this window joins it instead of
                // resetting the safety budget. Until a response arrives,
                // prior state/timer knowledge is no longer authoritative:
                // this command may change both.
                if (id(learned_sender_id) == 0) return;
                id(fan_state_known) = false;
                id(timer_state_known) = false;
                id(fan_state_known_sensor).publish_state(false);
                id(timer_state_known_sensor).publish_state(false);
                id(fan_confirmed_off_sensor).publish_state(false);
                id(refire_cmd) = cmd;
                id(refire_left) = refires;
                id(refire_next_ms) = millis() + ${command_refire_interval_ms};
                id(cl_active) = true;
                id(cl_desired_cmd) = cmd;
                id(cl_command_attempts) = 0;
                id(cl_last_command_completed_ms) = 0;
                id(cl_attempt_limit) = refires + 1;
                id(cl_query_due) = false;
                id(cl_query_window) = false;
                id(cl_query_count) = 0;
                id(cl_candidate_state) = 0xFF;
                id(cl_candidate_raw) = 0xFF;
                id(cl_candidate_capability) = 0;
                id(cl_candidate_total_count) = 0;
                id(cl_candidate_exact_count) = 0;
                id(cl_candidate_last_ms) = 0;
                id(cl_report_ready) = false;
                id(cl_report_confirmation) = false;
                id(cl_query_response_complete) = true;
                const char *label = "TIMER";
                if ((cmd & 0x0F) == 0x0) label = "OFF";
                else if (cmd == 0x9F) label = "LOW";
                else if (cmd == 0xAF) label = "MEDIUM";
                else if (cmd == 0xBF) label = "HIGH";
                char status[48];
                snprintf(status, sizeof(status), "pending %s confirmation", label);
                id(command_confirmation_status_sensor).publish_state(status);
            - script.execute:
                id: tx_burst
                cmd: !lambda 'return cmd;'

  - id: arm_manual_learn
    then:
      - lambda: |-
          // Shared by the Learn Remote ID button and the PRG very-long
          // press: tear down all pending RF work, drop state authority (a
          // re-pair invalidates everything), and open the 120 s manual
          // learn window. Deliberately does NOT touch learn_auto_armed_at -
          // manual windows are bounded and never re-arm themselves.
          id(tx_burst).stop();
          id(fan_state_known) = false;
          id(timer_state_known) = false;
          id(fan_state_known_sensor).publish_state(false);
          id(timer_state_known_sensor).publish_state(false);
          id(fan_confirmed_off_sensor).publish_state(false);
          id(refire_left) = 0;
          id(cl_active) = false;
          id(cl_query_due) = false;
          id(cl_query_window) = false;
          id(cl_query_epoch) = false;
          id(cl_query_epoch_confirmation) = false;
          id(cl_report_ready) = false;
          id(command_confirmation_status_sensor).publish_state("idle (learn mode)");
          id(learn_active) = true;
          id(learn_auto_mode) = false;
          id(learn_window_started) = millis();
          id(learn_candidate_id) = 0;
          id(learn_candidate_first_time) = 0;
          id(learn_confirm_until) = 0;
          ESP_LOGW("LEARN", "Manual learn armed for 120 seconds; press the OEM remote twice");

  - id: send_off
    then:
      - lambda: |-
          // OEM-faithful remembered-speed OFF: 90 from Low, A0 from
          // Medium, B0 from High. Production showed intermittent 0x90
          // acceptance from High, so speed matching is compatibility
          // policy, not a proven receiver requirement. A mismatch can
          // still re-aim subsequent retries from the reported speed.
          uint8_t off_speed_nibble = 0x90;
          if (id(quietcool_fan).speed == 2) off_speed_nibble = 0xA0;
          else if (id(quietcool_fan).speed >= 3) off_speed_nibble = 0xB0;
          id(off_tx_command) = off_speed_nibble;
      - logger.log:
          level: WARN
          format: "=== TX request: OFF (0x%02X, OEM speed variant) - ID: %08lX ==="
          args: [ "id(off_tx_command)", "(unsigned long) id(learned_sender_id)" ]
      - script.execute:
          id: begin_transaction
          cmd: !lambda 'return id(off_tx_command);'
          refires: ${off_refire_count}

  - id: send_low
    then:
      - logger.log:
          level: WARN
          format: "=== TX request: LOW (0x9F) - ID: %08lX ==="
          args: [ "(unsigned long) id(learned_sender_id)" ]
      - script.execute:
          id: begin_transaction
          cmd: 0x9F
          refires: ${command_refire_count}

  - id: send_medium
    then:
      - logger.log:
          level: WARN
          format: "=== TX request: MEDIUM (0xAF) - ID: %08lX ==="
          args: [ "(unsigned long) id(learned_sender_id)" ]
      - script.execute:
          id: begin_transaction
          cmd: 0xAF
          refires: ${command_refire_count}

  - id: send_high
    then:
      - logger.log:
          level: WARN
          format: "=== TX request: HIGH (0xBF) - ID: %08lX ==="
          args: [ "(unsigned long) id(learned_sender_id)" ]
      - script.execute:
          id: begin_transaction
          cmd: 0xBF
          refires: ${command_refire_count}

  - id: send_timer
    parameters:
      duration_nibble: uint8_t
    then:
      - lambda: |-
          // Speed-aware timer: combine the CURRENTLY SELECTED speed nibble
          // (from the fan entity; Low if the fan is off/unset) with the
          // requested duration nibble, e.g. High + 1H = 0xB1.
          uint8_t speed_nibble = 0x90;
          if (id(quietcool_fan).speed == 2) {
            speed_nibble = 0xA0;
          } else if (id(quietcool_fan).speed >= 3) {
            speed_nibble = 0xB0;
          }
          id(timer_tx_command) = speed_nibble | duration_nibble;
      - logger.log:
          level: WARN
          format: "=== TX: Timer command 0x%02X (speed-aware) ==="
          args: [ "id(timer_tx_command)" ]
      - script.execute:
          id: begin_transaction
          cmd: !lambda 'return id(timer_tx_command);'
          refires: ${command_refire_count}
# =============================================================================
# Timer deadline housekeeping (never transmits)
#
# The fan emits no RF event when its timer expires. Even a locally anchored
# estimate is therefore not physical confirmation. At the estimated deadline
# this firmware invalidates authority and requires Refresh; it never publishes
# a guessed fan OFF and never calls a transmit/control path.
# =============================================================================
interval:
  # Closed-loop coordinator. RX never executes a script: it only raises
  # cl_report_ready after response consensus. This interval compares that
  # report, publishes confirmed diagnostics/entity state, and launches the
  # passive 66 query through tx_burst. Actual command retries remain in the
  # original 250 ms spaced re-fire interval immediately below.
  - interval: 100ms
    then:
      - lambda: |-
          if (id(oem_query_seen) && (millis() - id(oem_query_seen_ms)) >= 2000UL) {
            id(oem_query_seen) = false;
          }
          if (id(cl_query_epoch) && !id(cl_query_epoch_confirmation) &&
              !id(cl_query_response_complete) &&
              (millis() - id(cl_query_started_ms)) > ${closed_loop_response_window_ms}) {
            id(cl_query_response_complete) = true;
            id(command_confirmation_status_sensor).publish_state(
                "manual refresh FAILED: no response consensus");
          }
          if (id(cl_query_epoch) &&
              (millis() - id(cl_query_started_ms)) > ${closed_loop_response_tail_ms}) {
            id(cl_query_epoch) = false;
            id(cl_query_epoch_confirmation) = false;
          }

          if (id(cl_report_ready)) {
            id(cl_report_ready) = false;
            bool report_for_transaction = id(cl_report_confirmation);
            id(cl_report_confirmation) = false;
            uint8_t actual = id(cl_report_state);
            uint8_t raw = id(cl_report_raw);
            uint8_t actual_duration = actual & 0x0F;
            uint8_t actual_speed = (actual >> 4) & 0x03;
            uint8_t desired = id(cl_desired_cmd) & 0x3F;
            uint8_t desired_duration = id(cl_desired_cmd) & 0x0F;
            bool state_matches = report_for_transaction &&
                (desired_duration == 0
                    ? actual_duration == 0
                    : actual == desired);
            uint8_t raw_speed_nibble = raw & 0xF0;
            uint8_t raw_duration = raw & 0x0F;
            bool raw_duration_ok =
                (raw_duration == 0x0 || raw_duration == 0x1 || raw_duration == 0x2 ||
                 raw_duration == 0x4 || raw_duration == 0x8 || raw_duration == 0xC ||
                 raw_duration == 0xF);
            bool report_could_be_command =
                ((raw_speed_nibble == 0x90 || raw_speed_nibble == 0xA0 ||
                  raw_speed_nibble == 0xB0) && raw_duration_ok) ||
                raw == 0x80;
            bool desired_is_off = desired_duration == 0;
            // Direction is timing-derived because fan responses and OEM
            // commands share the same six-byte form. Any command-shaped
            // MISMATCH during a command query is unsafe as physical proof.
            // Yield is a separate policy: ON requests yield only to a
            // conflicting running command, while OFF always keeps retrying.
            bool report_ambiguous_for_authority =
                report_for_transaction && !state_matches &&
                report_could_be_command;
            bool should_yield =
                report_ambiguous_for_authority &&
                !desired_is_off && actual_duration != 0;
            bool report_authoritative = !report_ambiguous_for_authority;
            // Even an otherwise valid OFF observation is unsafe to promote
            // while this transaction still intends to send an energizing
            // retry. Keep Fan Known/Confirmed Off false until the retry is
            // cancelled, exhausted, or a later query confirms the target.
            bool future_energizing_work =
                report_for_transaction && !state_matches &&
                !desired_is_off && id(refire_left) > 0 && !should_yield;

            uint32_t actual_timer_hours = 0;
            if (actual_duration == 0x1) actual_timer_hours = 1;
            else if (actual_duration == 0x2) actual_timer_hours = 2;
            else if (actual_duration == 0x4) actual_timer_hours = 4;
            else if (actual_duration == 0x8) actual_timer_hours = 8;
            else if (actual_duration == 0xC) actual_timer_hours = 12;
            bool locally_anchored_timer =
                report_for_transaction && state_matches &&
                actual_timer_hours > 0 &&
                desired_duration == actual_duration &&
                id(cl_last_command_completed_ms) != 0;
            // A query reports the programmed whole-hour duration, never the
            // remaining time. An active timer is safe to expose as current
            // state only when it matches our just-completed local command.
            bool state_authoritative =
                report_authoritative &&
                !future_energizing_work &&
                (actual_timer_hours == 0 || locally_anchored_timer);

            const char *speed_name = "UNKNOWN";
            if (actual_speed == 1) speed_name = "LOW";
            else if (actual_speed == 2) speed_name = "MEDIUM";
            else if (actual_speed == 3) speed_name = "HIGH";

            char confirmed[64];
            if (actual_duration == 0) {
              snprintf(confirmed, sizeof(confirmed), "OFF (raw %02X)", raw);
            } else if (actual_duration == 0x0F) {
              snprintf(confirmed, sizeof(confirmed), "%s continuous (raw %02X)", speed_name, raw);
            } else {
              // actual_timer_hours (above) already decoded this duration.
              snprintf(confirmed, sizeof(confirmed), "%s timer %luh (raw %02X)",
                       speed_name, (unsigned long) actual_timer_hours, raw);
            }
            if (state_authoritative) {
              id(confirmed_fan_state_sensor).publish_state(confirmed);
            }
            if (report_authoritative) {
              uint8_t report_capability = id(cl_report_capability);
              if (report_capability >= 1 && report_capability <= 3) {
                char capability_text[16];
                snprintf(capability_text, sizeof(capability_text), "%u-speed",
                         (unsigned int) report_capability);
                id(fan_capability_sensor).publish_state(capability_text);
              }
            }

            // Publish only authoritative physical state, never a passive or
            // direction-ambiguous observation. This is deliberately stricter
            // than the RF diagnostics and prevents HA from treating an OEM
            // command or unknown-age timer report as fan actuation.
            id(fan_state_known) = state_authoritative;
            if (!state_authoritative) {
              id(timer_state_known) = false;
              id(fan_state_known_sensor).publish_state(false);
              id(timer_state_known_sensor).publish_state(false);
              id(fan_confirmed_off_sensor).publish_state(false);
            } else {
              // Raw field mutation bypasses FanCall/control(), and the
              // confirmation-driven fan platform has no publish callback,
              // so confirmed publication is STRUCTURALLY incapable of
              // starting another RF transaction. (The old rf-echo guard
              // flag was removed as dead code once on_state ceased to
              // exist; the protection is architectural, not a flag.)
              if (actual_speed != 0) id(quietcool_fan).speed = actual_speed;
              id(quietcool_fan).state = actual_duration != 0;
              id(quietcool_fan).publish_state();
              id(fan_confirmed_off_sensor).publish_state(actual_duration == 0);
            }

            // Reconcile timer metadata only from this confirmed state. Local
            // timer requests deliberately do not start a countdown at button
            // time: a failed request must never manufacture a later OFF.
            // The response reports programmed whole hours, not remaining
            // time, so the local mirror is anchored at confirmation.
            if (state_authoritative) {
              id(timer_state_known) = true;
              if (actual_timer_hours > 0) {
                id(timer_active) = true;
                id(timer_armed_hours) = (uint8_t) actual_timer_hours;
                id(timer_expiry_millis) =
                    id(cl_last_command_completed_ms) + actual_timer_hours * 3600000UL;
                int32_t remaining_ms =
                    (int32_t) (id(timer_expiry_millis) - millis());
                id(timer_remaining_sensor).publish_state(
                    remaining_ms > 0 ? remaining_ms / 60000 : 0);
              } else {
                id(timer_active) = false;
                id(timer_remaining_sensor).publish_state(0);
              }
            } else {
              // Never retain an older countdown after an unknown-age or
              // ambiguous report; it could later manufacture a false expiry.
              id(timer_active) = false;
            }
            if (state_authoritative) {
              // Promote authority only after fan and timer data are coherent.
              id(fan_state_known_sensor).publish_state(true);
              id(timer_state_known_sensor).publish_state(true);
            }

            id(cl_candidate_state) = 0xFF;
            id(cl_candidate_raw) = 0xFF;
            id(cl_candidate_capability) = 0;
            id(cl_candidate_total_count) = 0;
            id(cl_candidate_exact_count) = 0;
            id(cl_candidate_last_ms) = 0;

            char status[160];
            if (!report_for_transaction) {
              if (state_authoritative) {
                snprintf(status, sizeof(status), "refreshed %s from response consensus", confirmed);
              } else {
                snprintf(status, sizeof(status),
                         "observed %s; timer remaining unknown (state not promoted)", confirmed);
              }
              ESP_LOGW("CLOSED_LOOP", "%s", status);
            } else if (state_matches) {
              id(refire_left) = 0;
              id(cl_active) = false;
              id(cl_query_due) = false;
              id(cl_query_window) = false;
              snprintf(status, sizeof(status), "confirmed %s after %u command(s), %u query(s)",
                       confirmed,
                       (unsigned int) id(cl_command_attempts),
                       (unsigned int) id(cl_query_count));
              ESP_LOGW("CLOSED_LOOP", "%s", status);
            } else if (id(refire_left) > 0) {
              // Mismatch yield policy. The wire format cannot distinguish
              // a fan reply from an OEM remote command (same frames, same
              // sender ID, same timing), so a consensus that CONTRADICTS
              // our request may actually be a physical remote press whose
              // preceding 66 66 query we missed while transmitting.
              // If the raw byte decodes as a valid OEM command, yield:
              // cancel the remaining re-fires and surface it, instead of
              // fighting a possible human override on air. EXCEPTION: an
              // OFF transaction never yields - if the user really pressed
              // a speed, the fan ends off and one re-press recovers it,
              // whereas yielding a real dropped OFF could leave a
              // whole-house fan running unattended. Safety points off.
              // Yield only to a RUNNING-state report. A fan that missed
              // our ON command reports its (off) idle state - 90/A0/B0,
              // all valid command encodings - so an off report on an ON
              // transaction is overwhelmingly a dropped command, not a
              // user press, and must keep its re-fires (live 2026-07-19:
              // a post-boot LOW wrongly yielded to the fan's own
              // still-off 90 reply).
              if (should_yield) {
                id(refire_left) = 0;
                id(cl_active) = false;
                id(cl_query_due) = false;
                id(cl_query_window) = false;
                snprintf(status, sizeof(status),
                         "possible OEM override: fan is %s; yielding (no re-fire)", confirmed);
                ESP_LOGW("CLOSED_LOOP", "%s", status);
              } else {
                // Re-aim an OFF transaction at the fan's ACTUAL speed. This
                // follows the OEM remote's remembered-speed construction and
                // may improve compatibility; production did not prove that
                // the receiver requires it. 0x80|(speed<<4) yields exactly
                // 90/A0/B0 for speeds 1-3; neutral 0x80 is never sent.
                if (desired_is_off && actual_speed >= 1 && actual_speed <= 3) {
                  uint8_t adapted_off = (uint8_t) (0x80 | (actual_speed << 4));
                  if (adapted_off != id(cl_desired_cmd)) {
                    id(cl_desired_cmd) = adapted_off;
                    id(refire_cmd) = adapted_off;
                    ESP_LOGW("CLOSED_LOOP",
                             "Re-aiming OFF at fan-reported speed: variant 0x%02X", adapted_off);
                  }
                }
                id(cl_query_due) = false;
                id(cl_query_window) = false;
                snprintf(status, sizeof(status), "mismatch: fan is %s; spaced re-fire pending (%d left)",
                         confirmed, id(refire_left));
                ESP_LOGW("CLOSED_LOOP", "%s", status);
              }
            } else {
              id(cl_active) = false;
              id(cl_query_due) = false;
              id(cl_query_window) = false;
              snprintf(status, sizeof(status), "FAILED after bounded attempts: fan is %s", confirmed);
              ESP_LOGE("CLOSED_LOOP", "%s", status);
            }
            id(command_confirmation_status_sensor).publish_state(status);
          }

          // Query timeout does not consume or remove a re-fire. With retries
          // left, the unchanged spaced backstop proceeds; after the final
          // command's final query, the transaction terminates explicitly.
          if (id(cl_active) && id(cl_query_window) &&
              (millis() - id(cl_query_started_ms)) > ${closed_loop_response_window_ms}) {
            id(cl_query_window) = false;
            if (id(refire_left) > 0) {
              char status[128];
              snprintf(status, sizeof(status), "no response consensus; spaced re-fire pending (%d left)",
                       id(refire_left));
              id(command_confirmation_status_sensor).publish_state(status);
            } else {
              id(cl_active) = false;
              char status[128];
              snprintf(status, sizeof(status), "FAILED: no consensus after %u command(s), %u query(s)",
                       (unsigned int) id(cl_command_attempts),
                       (unsigned int) id(cl_query_count));
              id(command_confirmation_status_sensor).publish_state(status);
              ESP_LOGE("CLOSED_LOOP", "%s", status);
            }
          }
      - if:
          condition:
            lambda: |-
              return id(cl_active) && id(cl_query_due) &&
                     id(learned_sender_id) != 0 &&
                     !id(tx_burst).is_running() &&
                     (int32_t)(millis() - id(cl_query_due_ms)) >= 0;
          then:
            - lambda: |-
                // is_running() does not include QueueingScript's pending
                // count. Clear stale queued work now that no burst is active,
                // so this current-transaction query cannot be rejected by the
                // max_runs guard or delayed behind obsolete commands.
                id(tx_burst).stop();
                id(cl_query_due) = false;
                id(cl_query_window) = true;
                id(cl_query_count) = id(cl_query_count) + 1;
                char status[64];
                snprintf(status, sizeof(status), "query %u after command %u/%u",
                         (unsigned int) id(cl_query_count),
                         (unsigned int) id(cl_command_attempts),
                         (unsigned int) id(cl_attempt_limit));
                id(command_confirmation_status_sensor).publish_state(status);
                ESP_LOGI("CLOSED_LOOP", "%s", status);
            - script.execute:
                id: tx_burst
                cmd: 0x66

  # Spaced command re-fire driver. When a command wrapper has armed a re-fire
  # (refire_left > 0), re-send refire_cmd through the single tx_burst path once
  # its spacing has elapsed, then decrement. This is the open-loop reliability
  # backstop for the fan's post-command dead-time: at least one of the spaced
  # re-sends lands while the fan is listening. tx_burst still refuses when
  # unprovisioned, and a heard OEM-remote command zeroes refire_left (in
  # on_packet) so this can never fight a physical press. Rollover-safe signed
  # compare, exactly like the timer arithmetic.
  - interval: 250ms
    then:
      - if:
          condition:
            lambda: |-
              return id(refire_left) > 0 &&
                     id(learned_sender_id) != 0 &&
                     !id(tx_burst).is_running() &&
                     (!id(cl_active) ||
                      id(cl_command_attempts) < id(cl_attempt_limit)) &&
                     (!id(cl_active) ||
                      (!id(cl_query_window) && !id(cl_report_ready))) &&
                     (!id(oem_query_seen) ||
                      (millis() - id(oem_query_seen_ms)) >= 2000UL) &&
                     (int32_t)(millis() - id(refire_next_ms)) >= 0;
          then:
            - lambda: |-
                // is_running() ignores QueueingScript's pending count. With
                // no burst active, discard stale queued work so the latest
                // desired refire below is accepted immediately.
                id(tx_burst).stop();
            - script.execute:
                id: tx_burst
                cmd: !lambda 'return id(refire_cmd);'
            - lambda: |-
                // When an initial enqueue was refused (queue pressure or OEM
                // holdoff), this interval supplies attempt #1 and must not
                // consume one of the pre-existing spaced re-fires. Later
                // automatic attempts decrement normally.
                if (id(cl_command_attempts) > 0) {
                  id(refire_left) = id(refire_left) - 1;
                }
                id(refire_next_ms) = millis() + ${command_refire_interval_ms};
                ESP_LOGD("REFIRE", "%s 0x%02X (%d re-fires left)",
                         id(cl_command_attempts) > 0 ? "Re-sent" : "Sent deferred initial",
                         id(refire_cmd), id(refire_left));

  - interval: 20s
    then:
      - lambda: |-
          if (!id(timer_state_known)) {
            return;
          }
          if (!id(timer_active)) {
            return;
          }
          int32_t remaining_ms = (int32_t) (id(timer_expiry_millis) - millis());
          if (remaining_ms > 0) {
            return;
          }
          ESP_LOGW("TIMER", "Estimated timer deadline reached; state unknown until Refresh (no TX)");
          id(timer_active) = false;
          id(fan_state_known) = false;
          id(timer_state_known) = false;
          id(fan_state_known_sensor).publish_state(false);
          id(timer_state_known_sensor).publish_state(false);
          id(fan_confirmed_off_sensor).publish_state(false);
          id(timer_remaining_sensor).publish_state(NAN);

  # Fan Timer select UI sync. Mirrors only a matching, locally initiated timer
  # or a query-confirmed no-timer state. Estimated expiry makes timer state
  # unknown and leaves the last/missing selection until fresh authority; an
  # unconfirmed pick or passive OEM command does not alter this mirror.
  # publish_state() never fires set_action, so this can never transmit.
  - interval: 1s
    then:
      - lambda: |-
          if (!id(timer_state_known)) {
            // Keep the select at its last confirmed/missing value while a
            // command outcome is unresolved. Force a refresh when knowledge
            // returns, even if the confirmed duration is unchanged.
            id(timer_select_synced_hours) = 0xFF;
            return;
          }
          const char *desired = "None";
          uint8_t desired_hours = 0;
          if (id(timer_active)) {
            switch (id(timer_armed_hours)) {
              case 1: desired = "1 hour"; desired_hours = 1; break;
              case 2: desired = "2 hours"; desired_hours = 2; break;
              case 4: desired = "4 hours"; desired_hours = 4; break;
              case 8: desired = "8 hours"; desired_hours = 8; break;
              case 12: desired = "12 hours"; desired_hours = 12; break;
              default: break;
            }
          }
          if (id(timer_select_synced_hours) != desired_hours) {
            id(timer_select_synced_hours) = desired_hours;
            id(fan_timer_select).publish_state(desired);
          }

  # Learn-window housekeeping is deliberately separate from the verified
  # timer mirror above. It only mutates learn globals and never reaches a
  # fan, script, or radio action. Manual windows expire at 120 seconds;
  # unprovisioned auto-learn re-arms its window, but FIX 1a bounds that
  # re-arming to 15 minutes after auto-learn was (re-)armed (at boot or by
  # a Forget - see learn_auto_armed_at above) so a parked unprovisioned
  # unit cannot keep listening for a neighbor's ID forever. Past that
  # ceiling it disarms fully, exactly like an expired manual window;
  # re-arming again requires a deliberate local/HA action.
  - interval: 1s
    then:
      - lambda: |-
          if (!id(learn_active)) {
            return;
          }
          uint32_t learn_elapsed = millis() - id(learn_window_started);
          if (learn_elapsed < 120000UL) {
            return;
          }
          id(learn_candidate_id) = 0;
          id(learn_candidate_first_time) = 0;
          bool auto_still_unprovisioned = id(learn_auto_mode) && id(learned_sender_id) == 0;
          bool within_auto_ceiling = (millis() - id(learn_auto_armed_at)) < 900000UL;
          if (auto_still_unprovisioned && within_auto_ceiling) {
            id(learn_window_started) = millis();
            ESP_LOGW("LEARN", "Auto-learn still unprovisioned; re-armed for another 120 seconds");
          } else {
            id(learn_active) = false;
            id(learn_auto_mode) = false;
            if (auto_still_unprovisioned) {
              ESP_LOGW("LEARN", "Auto-learn exceeded its 15-minute ceiling; disarming until a deliberate re-arm");
            } else {
              ESP_LOGW("LEARN", "Manual learn window expired without confirmation");
            }
          }

# =============================================================================
# Fan Entity
#
# The local quietcool_confirmed_fan platform is confirmation-driven. control()
# routes a request to one command script but deliberately does NOT mutate or
# publish the fan entity. Only authoritative, query-correlated closed-loop
# consensus publishes state. Passive RF and estimated timer expiry fail the
# explicit Known diagnostics closed without guessing a new fan state. HA can
# no longer mistake a requested OFF for confirmed actuation.
#
# restore_mode remains NO_RESTORE and the component never applies a restored
# state. setup() only raw-initializes speed=Low without publish/TX. A repeated
# fan.turn_off still reaches send_off even when observed state is already off;
# send_off decides whether that is a new transaction or joins an active one.
# =============================================================================
fan:
  - platform: quietcool_confirmed_fan
    name: "QuietCool Fan"
    id: quietcool_fan
    restore_mode: NO_RESTORE
    off_script: send_off
    low_script: send_low
    medium_script: send_medium
    high_script: send_high

# =============================================================================
# Fan Timer select
#
# Replaces the former Timer 1H/2H/4H buttons (and the former Fan OFF/Low/
# Medium/High buttons, whose function lives entirely on the fan entity:
# HA's fan card exposes off + three speeds directly, and the custom control
# path accepts a repeated off without optimistic publication). One dropdown arms
# the OEM timer at the CURRENT fan speed; the fan's full duration set
# (1/2/4/8/12 h) is exposed, not just the three the OEM remote surfaces.
#
# Two strictly separate directions:
#   - set_action (a deliberate user/HA selection) is the ONLY path that
#     transmits, and only via the same send_timer / send_* wrappers the
#     buttons used.
#   - The 1 s sync interval below mirrors authoritative device-local timer
#     state INTO the select with publish_state(), which never fires set_action.
#     Only a matching locally initiated timer has a defensible countdown;
#     unknown-age OEM timer reports and estimated expiry remain unknown until
#     Refresh. Query-confirmed continuous/off appears as None without TX.
# =============================================================================
select:
  - platform: template
    name: "Fan Timer"
    id: fan_timer_select
    icon: "mdi:timer-outline"
    options:
      - "None"
      - "1 hour"
      - "2 hours"
      - "4 hours"
      - "8 hours"
      - "12 hours"
    optimistic: false
    set_action:
      - lambda: |-
          uint8_t nibble = 0x0;
          if (x == "1 hour") nibble = 0x1;
          else if (x == "2 hours") nibble = 0x2;
          else if (x == "4 hours") nibble = 0x4;
          else if (x == "8 hours") nibble = 0x8;
          else if (x == "12 hours") nibble = 0xC;
          if (nibble != 0x0) {
            id(send_timer)->execute(nibble);
            return;
          }
          // The protocol has no non-actuating "clear timer" command. Sending
          // a continuous speed can restart a fan whose physical timer expired
          // since the last report, so None is a safe no-op. To intentionally
          // keep/restart the fan continuously, select a fan speed explicitly.
          id(timer_select_synced_hours) = 0xFF;
          ESP_LOGW("TIMER", "Timer None refused safely; choose an explicit fan speed to clear/restart continuous mode");

# =============================================================================
# Control Buttons
# =============================================================================
button:
  # User-facing state refresh: one non-energizing 66 66 status query. Bounded
  # response consensus can resync off/continuous state; an active timer of
  # unknown age stays explicitly unknown because the reply carries programmed
  # hours, not remaining time. No probe logging here. Same single TX path and
  # unprovisioned refusal as every other transmission.
  - platform: template
    name: "Refresh Fan State"
    icon: "mdi:refresh"
    on_press:
      - lambda: |-
          // Fail closed at enqueue time too: QueueingScript can reject an
          // over-capacity query before tx_burst's execution guard runs.
          id(fan_state_known) = false;
          id(timer_state_known) = false;
          id(timer_active) = false;
          id(fan_state_known_sensor).publish_state(false);
          id(timer_state_known_sensor).publish_state(false);
          id(fan_confirmed_off_sensor).publish_state(false);
      - script.execute:
          id: tx_burst
          cmd: 0x66

  # Diagnostic: transmit the OEM wake/status query (SENDER 66 66) and
  # raw-log every frame heard in the next 15 s (see query_probe_started).
  # The OEM remote sends exactly this query before every command and reads
  # the fan's current-state response; this probe exists to capture and
  # decode that response with our own receiver. The query is passive
  # traffic to the fan (no state change) and tx_burst still refuses it
  # while unprovisioned.
  - platform: template
    name: "Query Fan State (probe)"
    icon: "mdi:radar"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(fan_state_known) = false;
          id(timer_state_known) = false;
          id(timer_active) = false;
          id(fan_state_known_sensor).publish_state(false);
          id(timer_state_known_sensor).publish_state(false);
          id(fan_confirmed_off_sensor).publish_state(false);
          id(query_probe_started) = millis();
          ESP_LOGW("PROBE", "Probe window open: TXing 66 66 wake query, raw-logging RX for 15 s");
      - script.execute:
          id: tx_burst
          cmd: 0x66

  - platform: template
    name: "Learn Remote ID"
    icon: "mdi:remote"
    entity_category: config
    # Hidden by default: pairing is a one-time setup action. Enable the
    # entity from the device's Configuration section in HA when needed.
    disabled_by_default: true
    on_press:
      - script.execute: arm_manual_learn

  - platform: template
    name: "Forget Remote ID"
    icon: "mdi:remote-off"
    entity_category: config
    # Hidden by default like Learn: it erases the pairing, so it should
    # take a deliberate enable + press, not sit on the main control card.
    disabled_by_default: true
    on_press:
      - lambda: |-
          id(tx_burst).stop();
          id(fan_state_known) = false;
          id(timer_state_known) = false;
          id(fan_state_known_sensor).publish_state(false);
          id(timer_state_known_sensor).publish_state(false);
          id(fan_confirmed_off_sensor).publish_state(false);
          id(refire_left) = 0;
          id(cl_active) = false;
          id(cl_query_due) = false;
          id(cl_query_window) = false;
          id(cl_query_epoch) = false;
          id(cl_query_epoch_confirmation) = false;
          id(cl_report_ready) = false;
          id(command_confirmation_status_sensor).publish_state("idle (remote ID forgotten)");
          id(learned_sender_id) = 0;
          learned_sender_id->update();
          // FIX 2: suppress on_boot's compiled-default reseed so this
          // Forget survives the next reboot on a seeded build instead of
          // silently reverting.
          id(seed_suppressed) = true;
          seed_suppressed->update();
          global_preferences->sync();
          id(remote_sender_id_sensor).publish_state("unset");
          id(learn_active) = true;
          id(learn_auto_mode) = true;
          id(learn_window_started) = millis();
          // FIX 1a: Forget is itself a deliberate local/HA action, so it
          // re-establishes a fresh 15-minute auto-learn ceiling rather
          // than inheriting whatever remained from the original boot.
          id(learn_auto_armed_at) = millis();
          id(learn_candidate_id) = 0;
          id(learn_candidate_first_time) = 0;
          id(learn_confirm_until) = 0;
          ESP_LOGW("LEARN", "Sender ID forgotten and persisted; auto-learn armed for up to 15 minutes");

  - platform: restart
    name: "Restart"

# Physical button on board (GPIO0 = PRG/BOOT button). PIN CONFIDENCE: HIGH -
# GPIO0 is the standard ESP32/ESP32-S3 strapping/boot button pin used by
# every Espressif and third-party dev board, including this one.
binary_sensor:
  - platform: template
    name: "Fan State Known"
    id: fan_state_known_sensor
    icon: "mdi:check-decagram-outline"
    entity_category: diagnostic
    lambda: return id(fan_state_known);

  - platform: template
    name: "Timer State Known"
    id: timer_state_known_sensor
    icon: "mdi:timer-check-outline"
    entity_category: diagnostic
    lambda: return id(timer_state_known);

  - platform: template
    name: "Fan Confirmed Off"
    id: fan_confirmed_off_sensor
    icon: "mdi:fan-off"
    entity_category: diagnostic
    # Atomic safety signal: true means a bounded query consensus confirmed
    # OFF. False deliberately combines running and unknown/unconfirmed, so a
    # HA interlock never has to join Fan state with Fan State Known.
    lambda: return id(fan_state_known) && !id(quietcool_fan).state;

  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "PRG Button"
    on_click:
      - min_length: 50ms
        max_length: 500ms
        then:
          # Short press: cycle speed
          - lambda: |-
              if (!id(quietcool_fan).state) {
                auto call = id(quietcool_fan).turn_on();
                call.set_speed(1);
                call.perform();
              } else {
                int new_speed = id(quietcool_fan).speed + 1;
                if (new_speed > 3) new_speed = 1;
                auto call = id(quietcool_fan).turn_on();
                call.set_speed(new_speed);
                call.perform();
              }
      - min_length: 1000ms
        max_length: 4999ms
        then:
          # Long press: turn off. fan.turn_off always reaches the custom
          # control path, even if the observed entity already reads off;
          # send_off either starts or joins the bounded OFF transaction.
          - fan.turn_off: quietcool_fan
      - min_length: 5000ms
        max_length: 10000ms
        then:
          # Very long press: enter the same 120-second manual learn window
          # as the Home Assistant button. The 5000ms boundary does not
          # overlap the 1-4999ms unconditional-Off gesture above.
          - script.execute: arm_manual_learn

# =============================================================================
# OLED Display - v3.3 (temperature icons + Home Assistant logo glyph)
#
# 128x64, two zones, left-to-right (see tools/render_display.py for a
# pixel-accurate Python mirror of this whole block, used to generate the
# preview PNGs in docs/display-previews/ - every section below is tagged
# `KEEP IN SYNC: <NAME>` and the renderer carries the matching tag):
# ---- KEEP IN SYNC: CANVAS / ZONES ----
#   LEFT  zone (x   0-54): the real `mdi:fan` glyph (see tools/
#                          generate_fan_frames.py - NOT a hand-drawn
#                          triangle-blade icon; v3.1's version of that read
#                          as illegible "blades" per operator review),
#                          pre-rendered into twelve rotation frames and
#                          flipped between them (rotation speed proportional
#                          to fan speed; a distinct static `fan-off` glyph
#                          when off), with the state word (OFF/LOW/MED/HIGH)
#                          centered under it, the HH:MM:SS countdown (or
#                          nothing while continuous-on or off) centered
#                          under that, and a compact status icon row -
#                          WiFi signal strength, API connectivity (the
#                          `home-assistant` logo glyph as of v3.3 - see
#                          below), battery - pinned bottom-left,
#                          left-to-right, evenly spaced.
#   RIGHT zone (x 66-127): temperatures, right-aligned, each paired with a
#                          small icon in a shared left-edge column (v3.3:
#                          replaces the old "Out"/"At" text labels -
#                          operator feedback: "Out/At doesn't meaningfully
#                          tell me what's going on - icons for that would
#                          be nice too"). Indoor (the AIOsense mean) is
#                          dominant - largest font, topmost, paired with a
#                          small `home-thermometer-outline` glyph. Outdoor
#                          (`weather-sunny`) and Attic (`home-roof`) are
#                          smaller, below it. "--" for any missing or
#                          non-finite reading.
# The x55-65 gap between the zones is intentionally empty breathing room -
# v3.1's vertical status-icon column used to live there; freeing it let the
# fan glyph sit larger and better-centered in the LEFT zone (see "v3.2
# revisions" in README). No decorative borders, no filled chips - the
# animated fan icon itself is the "running" indicator.
# Learn mode/confirmation UI replaces the state-word + countdown text rows
# in the LEFT zone without moving the fan icon (see LEARN UI below).
#
# This whole block (fonts, image frames, display lambda) is copied
# verbatim from quietcool-lora32.yaml - the SSD1306 is the same
# panel on both boards, the fan-icon frame PNGs are shared build outputs
# (images/fan_frame_*.png, images/fan_off.png), and nothing in this section
# reads a radio- or board-specific ID.
# =============================================================================
font:
  - file: "gfonts://Roboto"
    id: font_state
    size: 11
    glyphs: "OFLWMEDHIG"
  - file: "gfonts://Roboto"
    id: font_timer
    size: 11
    glyphs: "0123456789:"
  - file: "gfonts://Roboto"
    id: font_learn
    size: 9
    glyphs: "LEARNP SX2DIVOTM"
  - file: "gfonts://Roboto"
    id: font_learn_prompt
    size: 8
    # Glyph SET for the "REMOTE X2" and "ID SAVED" prompts: each unique
    # character exactly once (ESPHome rejects duplicate glyphs).
    glyphs: "REMOTX2 IDSAV"
  - file: "gfonts://Roboto"
    id: font_temp_large
    size: 22
    glyphs: "0123456789°F-"
  - file: "gfonts://Roboto"
    id: font_temp_small
    size: 11
    glyphs: "0123456789°F-"
  # Material Design Icons webfont - only the glyphs actually drawn below
  # are included (verified codepoints; see fonts/materialdesignicons.css
  # reference used to look them up, not shipped in this repo). All icons -
  # WiFi/API/battery status row AND the v3.3 indoor/outdoor/attic
  # temperature-column icons - share this single 13px font so every glyph
  # on the panel reads at one visually consistent size.
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_icons
    size: 13
    glyphs: [
      "\U000F091F",  # wifi-strength-1 (weak)
      "\U000F0922",  # wifi-strength-2
      "\U000F0925",  # wifi-strength-3
      "\U000F0928",  # wifi-strength-4 (excellent)
      "\U000F092D",  # wifi-strength-off (disconnected)
      "\U000F07D0",  # home-assistant, the HA logo glyph (API connected) -
                      # v3.3: replaces the old filled `home` glyph, which
                      # now collides semantically with the new indoor
                      # home-thermometer-outline glyph below (see "v3.3
                      # revisions" in README)
      "\U000F0C9C",  # network-off-outline (API disconnected) - v3.3:
                      # replaces `home-off`, for the same reason as above.
                      # No slashed/hollow `home-assistant` variant exists
                      # in this font, and a hand-drawn slash overlaid on
                      # home-assistant's already-dense 13px silhouette
                      # rendered as illegible noise (tried and rejected -
                      # see README); this purpose-built MDI "off" glyph is
                      # the most legible disconnected treatment available,
                      # and its box-with-slash shape can't be confused
                      # with any house-shaped icon on the panel.
      "\U000F0083",  # battery-alert (critical, <15%) - solid body, "!" cutout
      "\U000F008E",  # battery-outline (15-59%, non-critical/non-full) -
                      # hollow silhouette. Deliberately NOT one of the
                      # numbered battery-20/40/70 glyphs: at 13px 1-bit
                      # those only differ by a faint fill band near the
                      # icon's TOP that's imperceptible at this size (the
                      # same illegibility failure as the old API glyph -
                      # verified by rendering all of them side by side
                      # before picking this set), so capacity is
                      # collapsed to three maximally-distinct silhouettes
                      # (alert/outline/full) instead of graduated steps.
      "\U000F0079",  # battery, filled (60-100%) - solid body
      "\U000F0084",  # battery-charging (topping-off voltage band) - bolt cutout
      "\U000F06A5",  # power-plug (USB-powered; battery full or absent)
      "\U000F0F55",  # home-thermometer-outline (indoor temperature icon) -
                      # v3.3. Tried the filled home-thermometer (U+F0F54)
                      # first per the operator brief; its roof+bulb fill
                      # collapsed into a blob at 13px 1-bit, while this
                      # hollow variant's house silhouette + thermometer
                      # stem stays crisp (same outline-over-filled
                      # tradeoff as battery-outline above).
      "\U000F0599",  # weather-sunny (outdoor temperature icon) - v3.3.
                      # Tried sun-thermometer (U+F18D6) and its outline
                      # variant (U+F18D7) first per the brief; both
                      # cram a dashed sun-ray glyph AND a thermometer stem
                      # into one 13px glyph and render as noise. This
                      # plain sun burst is crisp and unambiguous for
                      # "outdoor" - the adjoining "<value>°F" text already
                      # carries the temperature meaning.
      "\U000F112B",  # home-roof (attic temperature icon) - v3.3. A clean
                      # roof-triangle silhouette, the semantic and visual
                      # winner for "attic" on first try - no rejected
                      # alternates for this one.
    ]

# Pre-rendered fan-icon rotation frames. The MDI `mdi:fan` glyph (U+F0210,
# verified against fonts/materialdesignicons-webfont.ttf's own cmap - see
# tools/generate_fan_frames.py) is a flat 2D icon that ESPHome's display API
# cannot rotate at runtime, so tools/generate_fan_frames.py rotates it ahead
# of time into twelve 32x32 1-bit frames spanning the glyph's real
# 90-degree rotational symmetry period (7.5 degrees apart - see that
# tool's docstring for why 90 deg / 12 frames, not the 120 deg / 6 frames
# a naive 3-blade-glyph assumption would suggest: 6 frames makes the HIGH
# speed's +3-steps-per-refresh degenerate to alternating between just 2
# frames instead of spinning), plus a static un-rotated `mdi:fan-off`
# (U+F081D) frame for the off state. The display lambda below (KEEP IN
# SYNC: FAN_ANIM) just flips between these instead of drawing a hand-drawn
# triangle-blade icon.
image:
  - platform: file
    id: fan_frame_0
    file: "images/fan_frame_0.png"
    type: BINARY
  - platform: file
    id: fan_frame_1
    file: "images/fan_frame_1.png"
    type: BINARY
  - platform: file
    id: fan_frame_2
    file: "images/fan_frame_2.png"
    type: BINARY
  - platform: file
    id: fan_frame_3
    file: "images/fan_frame_3.png"
    type: BINARY
  - platform: file
    id: fan_frame_4
    file: "images/fan_frame_4.png"
    type: BINARY
  - platform: file
    id: fan_frame_5
    file: "images/fan_frame_5.png"
    type: BINARY
  - platform: file
    id: fan_frame_6
    file: "images/fan_frame_6.png"
    type: BINARY
  - platform: file
    id: fan_frame_7
    file: "images/fan_frame_7.png"
    type: BINARY
  - platform: file
    id: fan_frame_8
    file: "images/fan_frame_8.png"
    type: BINARY
  - platform: file
    id: fan_frame_9
    file: "images/fan_frame_9.png"
    type: BINARY
  - platform: file
    id: fan_frame_10
    file: "images/fan_frame_10.png"
    type: BINARY
  - platform: file
    id: fan_frame_11
    file: "images/fan_frame_11.png"
    type: BINARY
  - platform: file
    id: fan_off_frame
    file: "images/fan_off.png"
    type: BINARY

display:
  - platform: ssd1306_i2c
    id: oled
    model: "SSD1306 128x64"
    address: 0x3C
    # PIN CONFIDENCE: HIGH. The V3's OLED reset line is a real GPIO (GPIO21)
    # unlike the SX1278 LoRa32 V2.1 config, which leaves reset_pin unset;
    # cross-checked against the same two independent sources as the i2c:
    # block above.
    reset_pin: GPIO21
    # 250ms at 400kHz i2c (see the i2c: block above) gives a smooth-enough
    # fan-icon animation cadence without saturating the I2C bus or the main
    # loop - a full frame push is ~20-25ms at 400kHz, versus ~190ms at the
    # previous 50kHz default.
    update_interval: 250ms
    lambda: |-
      const char *speed_names[] = {"OFF", "LOW", "MED", "HIGH"};
      bool running = id(quietcool_fan).state;
      int speed = id(quietcool_fan).speed;
      int idx = (speed >= 1 && speed <= 3) ? speed : 0;
      const char *state_str = running ? speed_names[idx] : "OFF";

      // ---- KEEP IN SYNC: FAN_ANIM (tools/render_display.py: FAN_ANIM) ----
      // Real `mdi:fan` glyph (U+F0210), pre-rendered at build time into
      // twelve rotation frames (tools/generate_fan_frames.py) instead of a
      // hand-drawn triangle-blade icon (v3.1's version of that read as
      // illegible "blades" per operator review). fan_anim_frame only
      // advances while the fan is running - it freezes in place (never
      // resets) the instant the fan stops, at which point the display
      // switches to the static `fan-off` frame instead - giving a static,
      // visually distinct "off" look for free, with no extra state.
      // Purely cosmetic: read/written only here, never by any TX/RX path.
      //
      // Twelve frames, not six: with only 6 frames, HIGH's +3-per-refresh
      // step degenerates to alternating between exactly 2 frames forever
      // (gcd(3, 6) = 3) - a flicker, not a spin. Twelve frames (still the
      // same measured 90-degree symmetry period, just twice the angular
      // resolution) gives +1/+2/+3 real forward cycles of 12/6/4 frames
      // respectively - see tools/generate_fan_frames.py's docstring.
      int frame_step = 0;
      if (idx == 1) frame_step = 1;       // LOW
      else if (idx == 2) frame_step = 2;  // MED
      else if (idx == 3) frame_step = 3;  // HIGH
      if (running) {
        id(fan_anim_frame) = (id(fan_anim_frame) + frame_step) % 12;
      }
      image::Image *fan_frames[12] = {
          id(fan_frame_0), id(fan_frame_1), id(fan_frame_2), id(fan_frame_3),
          id(fan_frame_4), id(fan_frame_5), id(fan_frame_6), id(fan_frame_7),
          id(fan_frame_8), id(fan_frame_9), id(fan_frame_10), id(fan_frame_11),
      };
      image::Image *current_fan_frame = running ? fan_frames[id(fan_anim_frame)] : id(fan_off_frame);
      const int fan_icon_x = 11, fan_icon_y = 1;  // 32x32, LEFT zone x0-54
      it.image(fan_icon_x, fan_icon_y, current_fan_frame);

      // ---- KEEP IN SYNC: LEARN_STATE / STATE_WORD / COUNTDOWN ----
      // Learning owns the two text rows of the LEFT zone (the state-word
      // and countdown slots at v3.3 geometry): it replaces their normal
      // content but leaves the fan icon and the bottom status row in
      // place. The confirmation is a rollover-safe five-second cosmetic
      // state set only after the sender has been committed.
      const int left_zone_center_x = 27;
      bool learn_confirm = id(learn_confirm_until) != 0 &&
                           (int32_t) (id(learn_confirm_until) - millis()) > 0;
      if (id(learn_active)) {
        it.print(left_zone_center_x, 33, id(font_learn), TextAlign::TOP_CENTER, "LEARN");
        it.print(left_zone_center_x, 43, id(font_learn_prompt), TextAlign::TOP_CENTER, "REMOTE X2");
      } else if (learn_confirm) {
        it.print(left_zone_center_x, 33, id(font_learn), TextAlign::TOP_CENTER, "LEARNED");
        it.print(left_zone_center_x, 43, id(font_learn_prompt), TextAlign::TOP_CENTER, "ID SAVED");
      } else {
        // ---- KEEP IN SYNC: STATE_WORD ----
        // y=29/40 (originally 34/43): raised twice per on-hardware review -
        // the countdown's digit ink clipped the bottom status-icon row, and
        // the state word then needed 2px more air above the countdown.
        it.print(left_zone_center_x, 29, id(font_state), TextAlign::TOP_CENTER, state_str);

        // ---- KEEP IN SYNC: COUNTDOWN (HH:MM:SS while a timer is active, blank otherwise) ----
        // HH:MM:SS (zero-padded, ticking every second) while a device-local
        // timer is active. Continuous-on and off render nothing here.
        if (running && id(timer_state_known) && id(timer_active)) {
          int32_t remaining_ms = (int32_t) (id(timer_expiry_millis) - millis());
          if (remaining_ms < 0) {
            remaining_ms = 0;
          }
          int hh = remaining_ms / 3600000;
          int mm = (remaining_ms % 3600000) / 60000;
          int ss = (remaining_ms % 60000) / 1000;
          // y=40 (not the 43 the learn prompts use); see the state-word
          // note above.
          it.printf(left_zone_center_x, 40, id(font_timer), TextAlign::TOP_CENTER, "%02d:%02d:%02d", hh, mm, ss);
        }
      }

      // ---- KEEP IN SYNC: STATUS_ICONS (wifi + api + battery, bottom-left horizontal row) ----
      // Compact icon row pinned to the bottom-left corner - operator
      // review of v3.1 required moving this off the old center vertical
      // stack, which is now gone entirely (its freed width became
      // breathing room before the RIGHT/temps zone; see the display: block
      // header comment above). Left-to-right, evenly spaced, icons only.
      const int status_row_y = 52;
      const int status_wifi_x = 4, status_api_x = 21, status_battery_x = 38;
      bool wifi_up = wifi::global_wifi_component->is_connected();
      bool api_up = api::global_api_server->is_connected();
      const char *wifi_glyph;
      if (!wifi_up) {
        wifi_glyph = "\U000F092D";  // wifi-strength-off (disconnected)
      } else {
        float rssi = id(wifi_signal_sensor).state;
        if (rssi >= -55) wifi_glyph = "\U000F0928";       // excellent
        else if (rssi >= -65) wifi_glyph = "\U000F0925";  // good
        else if (rssi >= -75) wifi_glyph = "\U000F0922";  // fair
        else wifi_glyph = "\U000F091F";                   // weak
      }
      it.print(status_wifi_x, status_row_y, id(font_icons), TextAlign::TOP_LEFT, wifi_glyph);
      // home-assistant (the HA logo glyph) / network-off-outline - v3.3:
      // replaces the v3.1/v3.2 filled home/home-off pair, which now
      // collides semantically with the new indoor home-thermometer-
      // outline glyph in the RIGHT zone (KEEP IN SYNC: TEMP_ICONS below).
      // No slashed/hollow home-assistant variant exists in this font, and
      // a hand-drawn slash overlaid on the logo's already-dense 13px
      // silhouette rendered as illegible noise (tried and rejected - see
      // "v3.3 revisions" in README); network-off-outline is a purpose-
      // built MDI "off" glyph instead - its box-with-slash shape reads
      // unmistakably distinct from every house-shaped icon on the panel.
      const char *api_glyph = api_up ? "\U000F07D0" : "\U000F0C9C";  // home-assistant / network-off-outline
      it.print(status_api_x, status_row_y, id(font_icons), TextAlign::TOP_LEFT, api_glyph);

      // ---- KEEP IN SYNC: BATTERY_ICON (voltage-only heuristic; see README "Battery") ----
      // HONEST LIMITATION: the TP4054 charger's CHRG status pin is NOT
      // wired to the ESP32 on this board, so true charge state can never
      // be read - everything below infers battery/charging/plugged-in
      // purely from VBAT voltage (Battery Voltage sensor below), which is
      // a heuristic, not a fact. A battery resting near 4.2V shortly after
      // a charge finishes can look identical to one still under active CV
      // charge control; see README "Battery" for the full caveat and the
      // voltage->percent curve used for the separate Battery Level sensor.
      //
      // Tiers, ascending by voltage: 0=hidden(no battery attached, <2.5V)
      // 1=alert(<15%) 2=outline(15-59%, non-critical/non-full)
      // 3=full(60-100%, not charging/plugged) 4=charging(~4.20-4.30V
      // topping-off band) 5=plugged(>=4.30V, USB rail - full or absent).
      // Capacity is intentionally only THREE buckets (alert/outline/full),
      // not five - the numbered battery-20/40/70 glyphs were tried first
      // and rejected: at 13px 1-bit they only differ by a faint fill band
      // near the icon's top that's imperceptible at this size, so they
      // collapsed to three maximally-distinct silhouettes instead (see
      // the font: glyphs list comment above for the verification note).
      //
      // RISE[i]/FALL[i] give each tier boundary its own hysteresis gap so
      // a VBAT reading sitting right at a threshold can't flap the icon
      // every ~30s ADC sample; battery_icon_state (see globals: above)
      // persists the previous tier across display frames so the gap has
      // something to compare against.
      static const float BATT_RISE[5] = {2.55f, 3.74f, 3.90f, 4.23f, 4.33f};
      static const float BATT_FALL[5] = {2.45f, 3.68f, 3.84f, 4.17f, 4.27f};
      float vbatt = id(battery_voltage_sensor).has_state() ? id(battery_voltage_sensor).state : -1.0f;
      int prev_batt_tier = id(battery_icon_state);
      int batt_tier;
      if (prev_batt_tier < 0) {
        // Bootstrap (no reading yet this boot): pick a tier outright, with
        // no history to apply hysteresis against.
        batt_tier = 0;
        for (int i = 0; i < 5; i++) {
          if (vbatt >= BATT_RISE[i]) batt_tier = i + 1;
        }
      } else {
        batt_tier = prev_batt_tier;
        while (batt_tier < 5 && vbatt >= BATT_RISE[batt_tier]) batt_tier++;
        while (batt_tier > 0 && vbatt < BATT_FALL[batt_tier - 1]) batt_tier--;
      }
      id(battery_icon_state) = batt_tier;
      if (batt_tier > 0) {
        const char *batt_glyph;
        switch (batt_tier) {
          case 1: batt_glyph = "\U000F0083"; break;  // battery-alert
          case 2: batt_glyph = "\U000F008E"; break;  // battery-outline
          case 3: batt_glyph = "\U000F0079"; break;  // battery (full)
          case 4: batt_glyph = "\U000F0084"; break;  // battery-charging
          default: batt_glyph = "\U000F06A5"; break; // power-plug
        }
        // Tier 0 (hidden) intentionally draws nothing at all - a plausible
        // "no battery attached" reading means there's nothing honest to
        // show, so the status row just omits that slot rather than
        // guessing.
        it.print(status_battery_x, status_row_y, id(font_icons), TextAlign::TOP_LEFT, batt_glyph);
      }

      // ---- KEEP IN SYNC: TEMPERATURES ----
      // Right-aligned. "--" whenever a value is missing or non-finite (an
      // `unavailable` HA sensor publishes NAN, not just "no state yet" -
      // has_state() alone isn't enough).
      char in_buf[8];
      if (id(temp_indoor).has_state() && std::isfinite(id(temp_indoor).state)) {
        snprintf(in_buf, sizeof(in_buf), "%.0f", id(temp_indoor).state);
      } else {
        strcpy(in_buf, "--");
      }
      // Indoor (AIOsense mean): most prominent reading on the panel -
      // largest font, topmost, unlabeled since its size/position already
      // set it apart from the outdoor/attic readings below.
      it.printf(127, 0, id(font_temp_large), TextAlign::TOP_RIGHT, "%s°F", in_buf);

      char out_buf[8];
      if (id(temp_outdoor).has_state() && std::isfinite(id(temp_outdoor).state)) {
        snprintf(out_buf, sizeof(out_buf), "%.0f", id(temp_outdoor).state);
      } else {
        strcpy(out_buf, "--");
      }
      it.printf(127, 27, id(font_temp_small), TextAlign::TOP_RIGHT, "%s°F", out_buf);

      char attic_buf[8];
      if (id(temp_attic).has_state() && std::isfinite(id(temp_attic).state)) {
        snprintf(attic_buf, sizeof(attic_buf), "%.0f", id(temp_attic).state);
      } else {
        strcpy(attic_buf, "--");
      }
      it.printf(127, 43, id(font_temp_small), TextAlign::TOP_RIGHT, "%s°F", attic_buf);

      // ---- KEEP IN SYNC: TEMP_ICONS (tools/render_display.py: TEMP_ICONS) ----
      // v3.3: icons replace the "Out"/"At" text labels above (operator
      // feedback: "Out/At doesn't meaningfully tell me what's going on -
      // icons for that would be nice too, for primary interior temp,
      // outside, and attic"). One shared left-edge x for all three -
      // temp_icon_x=67 is the tightest legal value (RIGHT zone's left
      // seam sits at x=66, tools/render_display.py's MIN_MARGIN forbids
      // anything closer) - so the eye reads down one straight icon
      // column while the right-aligned numbers stay dominant and
      // unmoved from v3.1/v3.2. All three glyphs measure 13px wide, so
      // the column's right edge is a consistent x=80 too.
      //
      // KNOWN LIMITATION (pre-existing, not new to v3.3): indoor is 22pt
      // and right-aligned at x=127; a 2-digit reading ("78°F", 45px
      // wide) leaves the icon a 2px clearance, but a 3-digit reading
      // ("100°F", 57px wide) would overlap it. v3.1/v3.2 already left
      // indoor only ~4px of total zone margin at 3 digits with NO icon
      // at all, so this isn't a regression - flagged honestly rather
      // than silently hoping it doesn't happen (indoor stays 1-2 digits
      // in every state this controller has actually been run against).
      const int temp_icon_x = 67;
      // home-thermometer-outline (indoor) - vertically centers its 11px
      // ink against the 22pt indoor row's 16px ink height: (16-11)/2 =
      // 2.5, rounded up.
      it.print(temp_icon_x, 3, id(font_icons), TextAlign::TOP_LEFT, "\U000F0F55");
      // weather-sunny (outdoor) - its 12px ink is TALLER than the 11pt
      // outdoor row's 8px digit ink, so it centers slightly ABOVE the
      // row's own y: 27 + (8-12)/2 = 25.
      it.print(temp_icon_x, 25, id(font_icons), TextAlign::TOP_LEFT, "\U000F0599");
      // home-roof (attic) - its 8px ink height matches the 11pt attic
      // row's 8px digit ink height exactly, no offset needed.
      it.print(temp_icon_x, 43, id(font_icons), TextAlign::TOP_LEFT, "\U000F112B");

# Status LED - config-category housekeeping, not a control: it belongs
# in the device's Configuration section in HA.
# PIN CONFIDENCE: MEDIUM - GPIO35 for the onboard white LED is
# corroborated by general Heltec V3 community knowledge but was not in the
# port brief's pinout list and its drive polarity (active-high assumed,
# same as the SX1278 LoRa32 V2.1's unmodified `status_led`) is NOT confirmed
# from any source consulted here; flagged for bring-up.
light:
  - platform: status_led
    name: "Status LED"
    pin: GPIO35
    entity_category: config

# =============================================================================
# Sensors
#
# The homeassistant sensors and on-device mean below are TELEMETRY/DISPLAY
# ONLY. Nothing in this file attaches an on_value (or any other) automation
# to them, so a changing temperature can never reach a script that transmits.
# =============================================================================
sensor:
  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"

  # Battery telemetry - DIFFERENT HARDWARE PATH from the the SX1278 LoRa32
  # V2.1 boards. The V2.1's VBAT divider is always-on and lands on GPIO35,
  # which this board uses for the status LED (see `light:` above) - V3 puts
  # VBAT sensing on a separate ADC pin (GPIO1) gated by a dedicated enable
  # pin (GPIO37, see the battery_adc_enable switch above) and a different
  # divider ratio (390 kOhm / 100 kOhm, i.e. x4.9 to recover real cell
  # voltage, vs. the V2.1's onboard 2:1 divider = x2.0).
  #
  # PIN CONFIDENCE: MEDIUM. GPIO1 (ADC) + GPIO37 (enable) + the 390k/100k
  # ratio are corroborated by two independent community sources (Heltec's
  # own community forum thread on this exact question, and the
  # ropg/heltec_esp32_lora_v3 Arduino library README), agreeing with each
  # other, but this was NOT in the port brief's pinout list and is NOT
  # physically verified here.
  #
  # HONEST LIMITATION (same as the V2.1 boards): the TP4054-class charger's
  # CHRG status pin is NOT wired to the ESP32 on this board either, so
  # actual charge state (charging / done / fault) can never be read. Every
  # battery/charging/plugged-in indication this firmware shows - the icon
  # tier below and the Battery Level curve - is inferred from VBAT voltage
  # alone, which is a heuristic, not a fact. See README "Battery" for the
  # full caveat (written against the V2.1 boards, but the same reasoning
  # and the same voltage->percent curve apply here).
  - platform: adc
    pin: GPIO1
    id: battery_voltage_sensor
    name: "Battery Voltage"
    entity_category: diagnostic
    update_interval: 30s
    attenuation: 12db  # full 0-3.3V range at the pin (divided VBAT tops out well under that)
    filters:
      - multiply: 4.9  # undo the 390k/100k VBAT divider to report real cell voltage
      - sliding_window_moving_average:
          window_size: 4
          send_every: 1

  # Approximate LiPo state of charge, derived from Battery Voltage via a
  # piecewise-linear open-circuit-voltage curve (see README "Battery" for
  # the full table). This is a commonly used single-cell Li-ion/LiPo
  # approximation, not a datasheet curve for this exact cell, and is
  # sensitive to load current, temperature, and cell age - treat it as
  # indicative, not precise. Identical curve to the the SX1278 LoRa32
  # boards - the curve is a generic LiPo characteristic, not board-specific.
  - platform: template
    name: "Battery Level"
    id: battery_level_sensor
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    internal: false
    update_interval: 30s
    lambda: |-
      if (!id(battery_voltage_sensor).has_state() || !std::isfinite(id(battery_voltage_sensor).state)) {
        return NAN;
      }
      float v = id(battery_voltage_sensor).state;
      // Below the plausible Li-ion floor: almost certainly no battery is
      // attached (mirrors the display lambda's no-battery threshold), not
      // a real 0% reading.
      if (v < 2.5f) {
        return NAN;
      }
      static const float CURVE_V[] = {
          4.20f, 4.15f, 4.11f, 4.08f, 4.02f, 3.98f, 3.95f, 3.91f, 3.87f, 3.85f,
          3.84f, 3.82f, 3.80f, 3.79f, 3.77f, 3.75f, 3.73f, 3.71f, 3.69f, 3.61f, 3.27f};
      static const float CURVE_PCT[] = {
          100, 95, 90, 85, 80, 75, 70, 65, 60, 55,
          50,  45, 40, 35, 30, 25, 20, 15, 10, 5, 0};
      const int n = sizeof(CURVE_V) / sizeof(CURVE_V[0]);
      if (v >= CURVE_V[0]) return 100.0f;
      if (v <= CURVE_V[n - 1]) return 0.0f;
      for (int i = 0; i < n - 1; i++) {
        if (v <= CURVE_V[i] && v >= CURVE_V[i + 1]) {
          float frac = (v - CURVE_V[i + 1]) / (CURVE_V[i] - CURVE_V[i + 1]);
          return CURVE_PCT[i + 1] + frac * (CURVE_PCT[i] - CURVE_PCT[i + 1]);
        }
      }
      return 0.0f;

  # Display-only values imported from stable, UI-editable Home Assistant
  # helpers. All three are internal so values originating in Home Assistant
  # are not re-exported back as duplicate device entities. No automation is
  # attached; these IDs are read only by the OLED lambda above.
  - platform: homeassistant
    id: temp_indoor
    entity_id: ${display_indoor_entity}
    internal: true

  - platform: homeassistant
    id: temp_outdoor
    entity_id: ${display_outdoor_entity}
    internal: true

  - platform: homeassistant
    id: temp_attic
    entity_id: ${display_attic_entity}
    internal: true

  # Timer telemetry only - no automation is attached, so this can never
  # reach a script that transmits. It is a read-only mirror of a countdown
  # anchored only when a matching locally initiated timer command is
  # query-confirmed. Unknown-age timer reports and estimated expiry publish
  # no guessed remaining value.
  - platform: template
    name: "Timer Remaining"
    id: timer_remaining_sensor
    icon: "mdi:timer-outline"
    unit_of_measurement: "min"
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: 30s
    lambda: |-
      if (!id(timer_state_known)) {
        return {};
      }
      if (!id(timer_active)) {
        return 0;
      }
      int32_t remaining_ms = (int32_t) (id(timer_expiry_millis) - millis());
      if (remaining_ms <= 0) {
        return 0;
      }
      return remaining_ms / 60000;

  # Diagnostics
  - platform: template
    name: "TX Count"
    id: tx_count_sensor
    icon: "mdi:radio-tower"
    accuracy_decimals: 0
    state_class: total_increasing
    entity_category: diagnostic
    update_interval: never

  - platform: template
    name: "RX Valid Count"
    id: rx_valid_count_sensor
    icon: "mdi:radio-tower"
    accuracy_decimals: 0
    state_class: total_increasing
    entity_category: diagnostic
    update_interval: never

  - platform: template
    name: "RX Rejected Count"
    id: rx_rejected_count_sensor
    icon: "mdi:radio-tower"
    accuracy_decimals: 0
    state_class: total_increasing
    entity_category: diagnostic
    update_interval: never

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"

  - platform: template
    name: "Remote Sender ID"
    id: remote_sender_id_sensor
    icon: "mdi:remote"
    entity_category: diagnostic
    update_interval: never

  - platform: template
    name: "Last TX Command"
    id: last_tx_command_sensor
    icon: "mdi:radio-tower"
    entity_category: diagnostic
    update_interval: never

  - platform: template
    name: "Last Valid RX Frame"
    id: last_rx_frame_sensor
    icon: "mdi:radio-tower"
    entity_category: diagnostic
    update_interval: never

  - platform: template
    name: "Last Confirmed Fan State"
    id: confirmed_fan_state_sensor
    icon: "mdi:fan-check"
    entity_category: diagnostic
    update_interval: never

  - platform: template
    name: "Command Confirmation Status"
    id: command_confirmation_status_sensor
    icon: "mdi:check-network-outline"
    entity_category: diagnostic
    update_interval: never

  - platform: template
    name: "Fan Speed Capability"
    id: fan_capability_sensor
    icon: "mdi:fan-auto"
    entity_category: diagnostic
    update_interval: never

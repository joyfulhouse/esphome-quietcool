# QuietCool UPSTAIRS whole-house fan controller (second TTGO LoRa32 V2.1).
#
# This is deliberately NOT a fork of the firmware: it includes the downstairs
# file unchanged as a package and overrides only the per-device substitutions.
# ESPHome gives this file's substitutions precedence over the package's, so
# everything else (RF protocol, learn mode, display, safety architecture, and
# the shared wifi/api/ota/fallback-AP secrets) is identical by construction.
#
# Onboarding: seed 0x00000000 -> first boot enters auto-learn (15-minute
# window). Press any button on the UPSTAIRS OEM remote twice (>0.6 s apart,
# within 60 s). Do NOT press the downstairs remote or send downstairs fan
# commands during the window. Verify via the "Remote Sender ID" sensor.
substitutions:
  device_name: quietcool-lora32-upstairs
  device_friendly_name: "QuietCool Upstairs RF Controller"
  fallback_ap_ssid: "QuietCool-Upstairs"
  quietcool_sender_id: "0x00000000"
  display_indoor_entity: sensor.quietcool_display_upstairs_indoor
  display_outdoor_entity: sensor.quietcool_display_upstairs_outdoor
  display_attic_entity: sensor.quietcool_display_upstairs_attic

packages:
  base: !include quietcool-lora32.yaml
